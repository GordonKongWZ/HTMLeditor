<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文模板编辑器</title>
<!-- External CSS: component styles from CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
  integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5"
  crossorigin="anonymous">
<!-- Modular CSS (split by concern) -->
<link rel="stylesheet" href="src/styles/reset.css">
<link rel="stylesheet" href="src/styles/theme.css">
<link rel="stylesheet" href="src/styles/editor.css">
<!-- Per-component CSS is now injected dynamically by each component's index.js -->
</head>
<body>
<div id="app">

<!-- Top Bar -->
<div id="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3L2 7l10 4 10-4-10-4zM2 17l10 4 10-4M2 12l10 4 10-4"/>
    </svg>
    论文编辑器
  </div>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-import">📂 导入</button>
  <button class="tbtn" id="btn-export">📄 导出</button>
  <button class="tbtn" id="btn-copy">📋 复制代码</button>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-clear">🗑 清空</button>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-modules" title="块库管理">🧩 块库</button>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-shortcuts" title="键盘快捷键 (?)" aria-label="键盘快捷键">⌨ 快捷键</button>
  <div class="spacer"></div>
  <span style="font-size:11px;color:var(--t2)" id="bcount">0 个块</span>
</div>

<!-- Left Panel -->
<div id="lpanel">
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="tg">
      <button class="tbtn2" data-insert="h1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H1</button>
      <button class="tbtn2" data-insert="h2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H2</button>
      <button class="tbtn2" data-insert="h3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H3</button>
      <button class="tbtn2" data-insert="h4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H4</button>
      <button class="tbtn2" data-insert="h5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H5</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-insert="p"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h12M4 18h8"/></svg>段落</button>
      <button class="tbtn2" data-insert="blockquote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>引用</button>
      <button class="tbtn2" data-insert="ul"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>无序</button>
      <button class="tbtn2" data-insert="ol"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>有序</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-insert="abstract"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>摘要</button>
      <button class="tbtn2" data-insert="authors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>作者</button>
      <button class="tbtn2" data-insert="keywords"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>关键词</button>
      <button class="tbtn2" data-dialog="infobox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>信息框</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-dialog="img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>图片</button>
      <button class="tbtn2" data-dialog="video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>视频</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-dialog="eq-block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3a2 2 0 0 1 2 2v.5a.5.5 0 0 0 1 0V9a2 2 0 0 1 2-2h3"/><path d="M4 17h3a2 2 0 0 0 2-2v-.5a.5.5 0 0 1 1 0v.5a2 2 0 0 0 2 2h3"/></svg>公式块</button>
      <button class="tbtn2" data-dialog="eq-inline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3a2 2 0 0 1 2 2v.5a.5.5 0 0 0 1 0V9a2 2 0 0 1 2-2h3"/></svg>行内式</button>
      <button class="tbtn2" data-dialog="code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>代码</button>
      <button class="tbtn2" data-dialog="table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>表格</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-insert="refs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>文献</button>
      <button class="tbtn2" data-insert="divider"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>分割</button>
    </div>
  </div>

  <!-- Block editor -->
  <div id="beditor">
    <div id="blist">
      <div id="ehint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
        <div>使用上方工具栏插入组件块</div>
        <div style="font-size:10px;opacity:.6">每个组件独立生成代码片段</div>
      </div>
    </div>
  </div>

  <!-- Resize handle -->
  <div id="rhandle"></div>

  <!-- Code editor -->
  <div id="cewrap">
    <div id="cehead">
      <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
      <span>HTML 代码 · 实时预览</span>
      <div style="flex:1"></div>
      <button class="ce-tab act" id="ce-tab-tree" aria-label="树形视图">🌲 树形</button>
      <button class="ce-tab" id="ce-tab-html" aria-label="HTML 视图">◁▷ HTML</button>
      <span id="cchars" style="font-size:10px;color:var(--t2);margin-left:6px">0 chars</span>
    </div>
    <div id="ce-tree-pane"><div class="tv-empty">暂无内容</div></div>
    <textarea id="ctarea" spellcheck="false" style="display:none"
      placeholder="<!-- 插入组件后代码将在此显示，可直接编辑 -->"></textarea>
  </div>
</div><!-- /lpanel -->

<!-- Right Panel -->
<div id="rpanel">
  <div id="pbar">
    <span class="pbl">预览</span>
    <button class="dbtn act" data-w="100%"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>响应式</button>
    <button class="dbtn" data-w="1440px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>1440</button>
    <button class="dbtn" data-w="1280px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="2 19 22 19"/></svg>1280</button>
    <button class="dbtn" data-w="768px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>768</button>
    <button class="dbtn" data-w="390px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>390</button>
    <button class="dbtn" data-w="custom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>自定义</button>
    <input type="number" id="cw" value="800" min="200" max="2560" placeholder="宽">
    <span id="cdx">×</span>
    <input type="number" id="ch" value="600" min="200" max="2000" placeholder="高">
    <div class="vsep"></div>
    <select id="pscale">
      <option value="1">100%</option>
      <option value="0.75">75%</option>
      <option value="0.5">50%</option>
      <option value="0.33">33%</option>
    </select>
  </div>
  <div id="pouter" class="pv-resp">
    <div id="pfwrap"><iframe id="pframe" scrolling="yes"></iframe></div>
  </div>
</div><!-- /rpanel -->

</div><!-- /app -->

<!-- Dialog overlay -->
<div id="doverlay">
  <div id="dbox">
    <h3 id="dtitle">插入</h3>
    <div id="dcontent"></div>
    <div class="dbtns">
      <button class="dcancel" id="dcancel">取消</button>
      <button class="dconfirm" id="dconfirm">插入</button>
    </div>
  </div>
</div>

<!-- Context Menu: editor block area -->
<div id="ctxm">
  <div class="cxi" id="cx-up">↑ 上移</div>
  <div class="cxi" id="cx-dn">↓ 下移</div>
  <div class="cxs"></div>
  <div class="cxi" id="cx-dup">⧉ 复制块</div>
  <div class="cxs"></div>
  <div class="cxi danger" id="cx-del">✕ 删除</div>
</div>

<!-- Context Menu: tree view -->
<div id="ctxm-tree">
  <div class="cxi" id="cxt-edit">✎ 编辑 HTML</div>
  <div class="cxs"></div>
  <div class="cxi" id="cxt-up">↑ 上移</div>
  <div class="cxi" id="cxt-dn">↓ 下移</div>
  <div class="cxs"></div>
  <div class="cxi" id="cxt-dup">⧉ 复制块</div>
  <div class="cxs"></div>
  <div class="cxi" id="cxt-ins">＋ 在下方插入</div>
  <div class="cxs"></div>
  <div class="cxi danger" id="cxt-del">✕ 删除</div>
</div>

<!-- Context Menu: preview iframe -->
<div id="ctxm-pv">
  <div class="cxi" id="cxpv-sel">✓ 选中此块</div>
  <div class="cxs"></div>
  <div class="cxi danger" id="cxpv-del">✕ 删除</div>
</div>

<!-- Floating Format Bar (rich-text blocks) -->
<div id="fmt-bar">
  <button class="fmtb" id="fmt-b"  title="粗体 (Ctrl+B)"><b>B</b></button>
  <button class="fmtb" id="fmt-i"  title="斜体 (Ctrl+I)"><i>I</i></button>
  <button class="fmtb" id="fmt-s"  title="删除线 (Ctrl+S)"><s>S</s></button>
  <button class="fmtb fmtb-u" id="fmt-u"  title="下划线 (Ctrl+U)">U</button>
  <div class="fmtvsep"></div>
  <div id="fmt-colors">
    <span class="fmt-clr" data-c="#e63946" style="background:#e63946" title="红色"></span>
    <span class="fmt-clr" data-c="#ff9f1c" style="background:#ff9f1c" title="橙色"></span>
    <span class="fmt-clr" data-c="#2ec4b6" style="background:#2ec4b6" title="青色"></span>
    <span class="fmt-clr" data-c="#2644ba" style="background:#2644ba" title="蓝色"></span>
    <span class="fmt-clr" data-c="#6a0572" style="background:#6a0572" title="紫色"></span>
    <span class="fmt-clr fmt-clr-clear" data-c="" title="清除颜色"></span>
  </div>
</div>

<!-- Shortcut Help Modal -->
<div id="sc-overlay">
  <div id="sc-box">
    <div id="sc-head">
      <span>⌨ 键盘快捷键</span>
      <div id="sc-head-acts">
        <button class="sc-reset-btn" id="sc-reset" aria-label="恢复默认快捷键">↺ 恢复默认</button>
        <button id="sc-close" aria-label="关闭快捷键帮助">✕</button>
      </div>
    </div>
    <div id="sc-body"></div>
  </div>
</div>

<!-- Module Manager Panel -->
<div id="mod-overlay">
  <div id="mod-box">
    <div id="mod-head">
      <span>🧩 块库管理</span>
      <button id="mod-close" aria-label="关闭块库面板">✕</button>
    </div>
    <div id="mod-body">
      <div id="mod-list"></div>
    </div>
    <div id="mod-foot">
      <span id="mod-hint" style="font-size:11px;color:var(--t2)">内置模块不可删除</span>
      <div style="flex:1"></div>
      <button class="dcancel" id="mod-close2">关闭</button>
    </div>
  </div>
</div>

<!-- Paste Preview Dialog -->
<div id="paste-overlay">
  <div id="paste-box">
    <div id="paste-head">
      <span>📋 粘贴内容预览</span>
      <button id="paste-close">✕</button>
    </div>
    <div id="paste-preview-wrap">
      <iframe id="paste-iframe" sandbox="allow-same-origin"></iframe>
    </div>
    <div id="paste-code-wrap">
      <div id="paste-code-label">将插入 <span id="paste-block-count">0</span> 个块</div>
      <textarea id="paste-code" readonly spellcheck="false"></textarea>
    </div>
    <div class="dbtns">
      <button class="dcancel" id="paste-cancel">取消</button>
      <button class="dconfirm" id="paste-insert">插入</button>
    </div>
  </div>
</div>

<!-- KaTeX (deferred so it doesn't block render) -->
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg"
  crossorigin="anonymous"
  onload="window._katexReady=true"></script>

<!-- Modular application entry point (ES module) -->
<script type="module" src="src/app.js"></script>
</body>
</html>

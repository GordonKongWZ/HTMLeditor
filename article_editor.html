/* Render shortcut modal body (called each time modal opens or binding changes) */
function _renderScModal() {
  var body = $id('sc-body');
  body.innerHTML = '';

  var CAT_TITLES = {
    insert: '插入块（可自定义 · 点击按键修改）',
    block:  '选中块操作（固定）',
    rich:   '富文本格式（固定 · 文本编辑中）',
    other:  '其他（固定）'
  };

  ['insert', 'block', 'rich', 'other'].forEach(function(cat) {
    var defs = SC_DEFS.filter(function(d) { return d.cat === cat; });
    if (!defs.length) return;

    var sec = mkDiv('sc-section');
    var h = document.createElement('div');
    h.className = 'sc-section-title'; h.textContent = CAT_TITLES[cat];
    sec.appendChild(h);

    var tbl = document.createElement('table'); tbl.className = 'sc-table';
    defs.forEach(function(def) {
      var tr = document.createElement('tr');
      var td1 = document.createElement('td'); td1.textContent = def.label;
      var td2 = document.createElement('td'); td2.className = 'sc-kbd-cell';

      if (def.fixed) {
        td2.innerHTML = _scKeyHtml(def.def);
      } else {
        td2.appendChild(_scMakeEditBadge(def));
      }

      tr.appendChild(td1); tr.appendChild(td2);
      tbl.appendChild(tr);
    });
    sec.appendChild(tbl);
    body.appendChild(sec);
  });

  var hint = mkDiv('sc-hint');
  hint.textContent = '可自定义项仅支持字母和数字键（无修饰键）；已被占用的绑定将自动解除';
  body.appendChild(hint);
}

/* Returns inline HTML for displaying a key (may contain + for combos) */
function _scKeyHtml(key) {
  if (!key) return '<span class="sc-unbound-lbl">—</span>';
  return key.split('+').map(function(p) { return '<kbd>' + esc(p) + '</kbd>'; }).join('+');
}

/* Build an editable key badge DOM element */
function _scMakeEditBadge(def) {
  var key = _scMap[def.id] || '';
  var isCapturing = (def.id === _scCapturing);

  var badge = document.createElement('span');
  badge.className = 'sc-edit-badge' + (isCapturing ? ' sc-capturing' : '');
  badge.dataset.scid = def.id;

  var kbd = document.createElement('kbd');
  if (!key) kbd.className = 'sc-unbound';

  if (isCapturing) {
    kbd.textContent = '…';
  } else {
    kbd.textContent = key ? key.toUpperCase() : '—';
  }

  var tip = document.createElement('span');
  tip.className = 'sc-edit-tip';
  tip.textContent = isCapturing ? '按新键（Esc 取消）' : (key ? '✎ 点击修改' : '✎ 点击绑定');

  badge.appendChild(kbd);
  badge.appendChild(tip);

  badge.addEventListener('click', function(e) {
    e.stopPropagation();
    _scCapturing = def.id;
    _renderScModal();
  });

  return badge;
}

/* Handle a keydown while in capture mode */
function _scHandleCapture(e) {
  e.preventDefault();
  e.stopPropagation();

  if (e.key === 'Escape') {
    _scCapturing = null;
    _renderScModal();
    return;
  }

  // Accept only single letter or digit, no modifiers
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  var key = e.key;
  if (key.length !== 1 || !/^[a-z0-9]$/i.test(key)) return;

  var keyNorm = key.toLowerCase();

  // Displace any other configurable action that already owns this key
  SC_DEFS.forEach(function(d) {
    if (!d.fixed && d.id !== _scCapturing && _scMatchesKey(d.id, keyNorm)) {
      _scMap[d.id] = '';
    }
  });

  _scMap[_scCapturing] = keyNorm;
  _scSave();
  _scCapturing = null;
  _renderScModal();
}

/* Returns true when the user is actively editing text (so shortcuts should not fire) */
function _isEditingText() {
  var ae = document.activeElement;
  if (!ae || ae === document.body) return false;
  var tag = ae.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
  if (ae.isContentEditable) return true;
  return false;
}

/* Returns true when any modal / dialog overlay is open */
function _isModalOpen() {
  return $id('doverlay').classList.contains('open') ||
         $id('sc-overlay').classList.contains('open');
}

document.addEventListener('keydown', function(e) {
  // Capture mode takes priority over everything
  if (_scCapturing) { _scHandleCapture(e); return; }

  // Escape: close shortcut modal first; otherwise deselect block (when not editing)
  if (e.key === 'Escape') {
    if ($id('sc-overlay').classList.contains('open')) { closeShortcutHelp(); return; }
    if (!_isEditingText() && !$id('doverlay').classList.contains('open')) { setSelected(null); }
    return;
  }

  // Ctrl/Meta+D: duplicate selected block
  if ((e.ctrlKey || e.metaKey) && !e.altKey && e.key.toLowerCase() === 'd') {
    if (!_isEditingText() && !_isModalOpen() && _sel) {
      e.preventDefault();
      duplicateBlock(_sel);
    }
    return;
  }

  // All remaining shortcuts: skip when editing text, dialog open, or modifier held
  if (_isEditingText()) return;
  if (_isModalOpen()) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // Fixed non-configurable shortcuts
  switch (e.key) {
    case 'ArrowUp':   if (_sel) { e.preventDefault(); moveBlock(_sel, -1); } return;
    case 'ArrowDown': if (_sel) { e.preventDefault(); moveBlock(_sel,  1); } return;
    case 'Delete':
    case 'Backspace': if (_sel) { e.preventDefault(); deleteBlock(_sel); }   return;
    case '?': e.preventDefault(); openShortcutHelp(); return;
  }

  // Configurable shortcuts: look up in _scMap
  if (e.key.length !== 1) return;
  var keyNorm = e.key.toLowerCase();
  for (var i = 0; i < SC_DEFS.length; i++) {
    var def = SC_DEFS[i];
    if (!def.fixed && _scMatchesKey(def.id, keyNorm)) {
      e.preventDefault();
      _scDispatch(def.id);
      return;
    }
  }
});

/* =========================================================
   SHORTCUT HELP MODAL
   ========================================================= */
function openShortcutHelp() {
  _renderScModal();
  $id('sc-overlay').classList.add('open');
}
function closeShortcutHelp() {
  _scCapturing = null;
  $id('sc-overlay').classList.remove('open');
}

$id('sc-close').addEventListener('click', closeShortcutHelp);
$id('sc-reset').addEventListener('click', _scReset);
$id('sc-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeShortcutHelp();
});
$id('btn-shortcuts').addEventListener('click', openShortcutHelp);

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文模板编辑器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#2644ba;--acl:#e8ecf9;--acm:#8fa0dc;--acd:#1a3090;--acb:#b8c4ec;
  --bg0:#fff;--bg1:#f5f5f3;--bg2:#eeede9;--bge:#1e1e2e;
  --t0:#1a1a18;--t1:#5f5e5a;--t2:#888780;
  --bl:rgba(0,0,0,0.08);--bm:rgba(0,0,0,0.14);
  --fs:-apple-system,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --fm:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --r4:4px;--r8:8px;--r12:12px
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fs);background:var(--bg2);color:var(--t0);-webkit-font-smoothing:antialiased}

/* ── Layout ── */
#app{display:grid;grid-template-rows:46px 1fr;grid-template-columns:1fr 1fr;height:100vh}
#topbar{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:#fff;border-bottom:1px solid var(--bl);box-shadow:0 1px 3px rgba(0,0,0,.05);z-index:100
}
.logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ac);letter-spacing:-.02em}
.logo svg{width:20px;height:20px}
.vsep{width:1px;height:18px;background:var(--bm);margin:0 2px}
.tbtn{
  padding:4px 10px;border-radius:var(--r4);border:1px solid var(--bm);background:#fff;
  font-size:12px;font-family:var(--fs);color:var(--t1);cursor:pointer;transition:all .12s;white-space:nowrap
}
.tbtn:hover{background:var(--bg1);color:var(--t0)}
.tbtn.prim{background:var(--ac);color:#fff;border-color:var(--acd)}
.spacer{flex:1}

/* ── Left panel ── */
#lpanel{
  display:flex;flex-direction:column;border-right:1px solid var(--bm);
  background:var(--bg1);overflow:hidden;min-width:0
}

/* ── Toolbar ── */
#toolbar{
  background:#fff;border-bottom:1px solid var(--bl);
  padding:5px 8px;display:flex;flex-wrap:wrap;gap:2px;align-items:center;flex-shrink:0
}
.tg{display:flex;align-items:center;gap:1px;padding-right:6px;border-right:1px solid var(--bl)}
.tg:last-child{border-right:none;padding-right:0}
.tbtn2{
  display:flex;align-items:center;justify-content:center;gap:3px;padding:4px 6px;
  border:none;background:transparent;border-radius:var(--r4);
  font-size:11px;font-family:var(--fs);color:var(--t1);cursor:pointer;transition:all .1s;white-space:nowrap;line-height:1
}
.tbtn2:hover{background:var(--acl);color:var(--ac)}
.tbtn2 svg{width:13px;height:13px;flex-shrink:0}

/* ── Block editor ── */
#beditor{flex:1;overflow-y:auto;padding:12px 12px 12px 38px;background:#fff;min-height:0}
#blist{display:flex;flex-direction:column;gap:3px;min-height:100%}

/* Empty hint */
#ehint{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;color:var(--t2);font-size:12px;gap:8px;text-align:center
}
#ehint svg{width:28px;height:28px;opacity:.35}

/* Block item */
.bi{
  position:relative;border-radius:var(--r4);border:1.5px solid transparent;transition:border-color .1s
}
.bi:hover{border-color:var(--acb)}
.bi.sel{border-color:var(--ac);background:rgba(38,68,186,.03)}

/* Block controls (left gutter) */
.bctrl{
  position:absolute;left:-30px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:2px;opacity:0;transition:opacity .1s
}
.bi:hover .bctrl{opacity:1}
.bcb{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border:none;background:#fff;border-radius:var(--r4);color:var(--t2);cursor:pointer;
  font-size:10px;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:all .1s
}
.bcb:hover{color:var(--ac);background:var(--acl)}

/* Block type badge */
.btbadge{
  position:absolute;right:5px;top:3px;font-size:9px;font-weight:600;color:var(--acm);
  opacity:0;pointer-events:none;text-transform:uppercase;letter-spacing:.05em;transition:opacity .1s
}
.bi:hover .btbadge{opacity:1}

/* Block inner */
.binn{padding:6px 8px}

/* Editable divs inside blocks */
.be{
  outline:none;width:100%;min-height:1.4em;font-family:var(--fs);font-size:13px;
  line-height:1.7;color:var(--t0);border:none;background:transparent;
  word-break:break-word;white-space:pre-wrap
}
.be:empty::before{content:attr(data-ph);color:var(--t2);pointer-events:none}

/* heading styles */
.bi-h1 .be{font-size:1.15rem;font-weight:700}
.bi-h2 .be{font-size:1rem;font-weight:700;color:var(--ac)}
.bi-h3 .be{font-size:.95rem;font-weight:600}
.bi-h4 .be{font-size:.88rem;font-weight:500;color:var(--t1)}
.bi-h5 .be{font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}

/* Abstract preview */
.abx{background:var(--acl);border:.5px solid var(--acb);border-radius:var(--r8);padding:8px 12px}
.abxtit{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ac);margin-bottom:5px}
.abx .be{font-size:12px;color:var(--acd)}

/* Blockquote */
.bqx{border-left:3px solid var(--ac);background:var(--acl);border-radius:0 var(--r8) var(--r8) 0;padding:7px 10px}
.bqx .be{font-style:italic;color:var(--acd);font-size:13px}

/* Infobox preview */
.ibx{border-radius:var(--r8);padding:7px 10px}
.ibxtit{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}

/* Eq block */
.eqx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r8);padding:7px 12px;text-align:center}
.eqx .eqlbl{font-size:9px;color:var(--t2);display:block;text-align:left;margin-bottom:3px}
.eqx .eqraw{font-family:var(--fm);font-size:12px;color:var(--t0)}

/* Inline eq */
.iqx{display:inline-block;background:var(--bg1);border:.5px solid var(--bm);border-radius:4px;padding:2px 7px;font-family:var(--fm);font-size:12px}

/* Image preview */
.imgx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r12);overflow:hidden}
.imgph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px;color:var(--t2);font-size:11px}
.imgph svg{width:24px;height:24px;opacity:.4}
.imgcap{border-top:.5px solid var(--bm);background:var(--bg2);padding:4px 10px;font-size:11px;text-align:center;color:var(--t1)}

/* Video preview */
.vidx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r12);overflow:hidden}
.vidph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#111;padding:18px;color:#777;font-size:11px}
.vidph svg{width:28px;height:28px;opacity:.4}
.vidcap{border-top:.5px solid var(--bm);background:var(--bg2);padding:4px 10px;font-size:11px;text-align:center;color:var(--t1)}

/* Table preview */
.tblx{overflow-x:auto;border:.5px solid var(--bm);border-radius:var(--r8)}
.tblx table{border-collapse:collapse;font-size:11px;width:100%}
.tblx th{background:var(--acl);color:var(--acd);font-weight:500;padding:5px 9px;text-align:left;border-bottom:.5px solid var(--acb);white-space:nowrap}
.tblx td{padding:4px 9px;border-bottom:.5px solid var(--bl);white-space:nowrap}
.tblx tr:nth-child(even) td{background:var(--bg1)}
.tblcap{font-size:10px;color:var(--t2);margin-bottom:4px}

/* Code block preview */
.cbx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r8);overflow:hidden}
.cbxh{display:flex;align-items:center;justify-content:space-between;padding:3px 9px;background:var(--bg2);border-bottom:.5px solid var(--bm);font-size:10px;color:var(--t2)}
.cbx .be{font-family:var(--fm);font-size:11px;background:var(--bg1);padding:7px 9px;line-height:1.6}

/* Resize handle */
#rhandle{
  height:7px;background:var(--bg2);border-top:1px solid var(--bl);border-bottom:1px solid var(--bl);
  cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none
}
#rhandle::before{content:'';width:28px;height:2px;background:var(--bm);border-radius:2px}
#rhandle:hover::before{background:var(--acm)}

/* Code editor */
#cewrap{display:flex;flex-direction:column;overflow:hidden;background:var(--bge);min-height:0;height:200px}
#cehead{
  display:flex;align-items:center;gap:7px;padding:4px 12px;background:#16162a;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0
}
#cehead span{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--fm)}
.dot{width:8px;height:8px;border-radius:50%}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
#ctarea{
  flex:1;background:var(--bge);color:#cdd6f4;border:none;outline:none;
  padding:12px 14px;font-family:var(--fm);font-size:12px;line-height:1.65;
  resize:none;overflow-y:auto;white-space:pre;tab-size:2;min-height:0
}

/* ── Right panel (preview) ── */
#rpanel{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
#pbar{
  display:flex;align-items:center;gap:5px;padding:0 10px;
  background:#fff;border-bottom:1px solid var(--bl);flex-shrink:0;height:42px;overflow-x:auto
}
.pbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap}
.dbtn{
  display:flex;align-items:center;gap:3px;padding:3px 7px;border:1px solid var(--bm);
  border-radius:var(--r4);background:#fff;font-size:11px;font-family:var(--fs);color:var(--t1);
  cursor:pointer;transition:all .1s;white-space:nowrap
}
.dbtn svg{width:12px;height:12px}
.dbtn:hover{background:var(--acl);color:var(--ac);border-color:var(--acb)}
.dbtn.act{background:var(--ac);color:#fff;border-color:var(--acd)}
#pscale{
  font-size:11px;color:var(--t1);padding:3px 6px;border:1px solid var(--bm);
  border-radius:var(--r4);background:#fff;font-family:var(--fs);cursor:pointer;outline:none
}
#cw,#ch{
  width:54px;padding:3px 5px;border:1px solid var(--bm);border-radius:var(--r4);
  background:#fff;font-size:11px;font-family:var(--fs);color:var(--t0);outline:none;
  text-align:center;display:none
}
#cw:focus,#ch:focus{border-color:var(--acm)}
#cdx{font-size:11px;color:var(--t2);display:none}

/* Preview outer */
#pouter{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(0,0,0,.04) 20px),
    repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(0,0,0,.04) 20px),
    var(--bg2)
}
#pfwrap{transition:width .3s cubic-bezier(.4,0,.2,1),transform .25s;transform-origin:top center;width:100%}
#pframe{
  width:100%;border:1px solid var(--bm);border-radius:var(--r12);
  box-shadow:0 4px 20px rgba(0,0,0,.1);background:#fff;overflow:hidden;min-height:300px;
  display:block
}

/* ── Dialog ── */
#doverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:1000;align-items:center;justify-content:center
}
#doverlay.open{display:flex}
#dbox{
  background:#fff;border-radius:var(--r12);padding:22px;
  min-width:340px;max-width:520px;width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.2)
}
#dbox h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--t0)}
.df{margin-bottom:10px}
.df label{display:block;font-size:11px;font-weight:500;color:var(--t1);margin-bottom:4px}
.df input,.df select,.df textarea{
  width:100%;padding:6px 9px;border:1px solid var(--bm);border-radius:var(--r4);
  font-size:12px;font-family:var(--fs);color:var(--t0);outline:none;background:#fff
}
.df input:focus,.df select:focus,.df textarea:focus{
  border-color:var(--acm);box-shadow:0 0 0 3px rgba(38,68,186,.1)
}
.df textarea{resize:vertical;min-height:72px}
.dbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.dbtns button{
  padding:6px 14px;border-radius:var(--r4);border:1px solid var(--bm);
  font-size:12px;font-family:var(--fs);cursor:pointer;transition:all .1s
}
.dcancel{background:#fff;color:var(--t1)}
.dcancel:hover{background:var(--bg1)}
.dconfirm{background:var(--ac);color:#fff;border-color:var(--acd)}
.dconfirm:hover{background:var(--acd)}

/* Table builder */
.tbed{overflow-x:auto;max-height:200px;overflow-y:auto}
.tbed table{border-collapse:collapse;font-size:12px}
.tbed th,.tbed td{border:1px solid var(--bm);padding:0}
.tbed th input,.tbed td input{
  border:none;padding:4px 7px;font-size:11px;font-family:var(--fs);
  width:90px;background:transparent;outline:none
}
.tbed th{background:var(--acl)}
.tbed th input{color:var(--acd);font-weight:500}
.tadd{
  padding:3px 9px;border:1px dashed var(--bm);border-radius:var(--r4);
  background:transparent;font-size:11px;color:var(--t2);cursor:pointer
}
.tadd:hover{border-color:var(--acm);color:var(--ac)}
.tbtns{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap}

/* Context menu */
#ctxm{
  display:none;position:fixed;z-index:2000;background:#fff;border:1px solid var(--bm);
  border-radius:var(--r8);padding:3px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:130px
}
#ctxm.open{display:block}
.cxi{
  padding:5px 11px;font-size:11px;color:var(--t0);border-radius:var(--r4);
  cursor:pointer;display:flex;align-items:center;gap:5px
}
.cxi:hover{background:var(--acl);color:var(--ac)}
.cxi.danger:hover{background:#fcebeb;color:#791f1f}
.cxs{height:1px;background:var(--bl);margin:2px 0}

/* Scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acm)}

/* Eq preview in dialog */
#eqpv{
  border:.5px solid var(--bm);border-radius:var(--r4);padding:8px 12px;
  text-align:center;background:var(--bg1);min-height:38px;font-size:13px;margin-top:5px
}

.edit-btn{
  display:inline-block;margin-top:4px;padding:3px 9px;border:1px dashed var(--bm);
  border-radius:var(--r4);background:transparent;font-size:11px;color:var(--t2);cursor:pointer
}
.edit-btn:hover{border-color:var(--acm);color:var(--ac)}

/* ── Rich text block ── */
.rich-be{white-space:normal}
.rich-be b,.rich-be strong{font-weight:700}
.rich-be i,.rich-be em{font-style:italic}
.rich-be u{text-decoration:underline}
.rich-be s,.rich-be del,.rich-be strike{text-decoration:line-through}

/* ── Floating format bar ── */
#fmt-bar{
  position:fixed;display:none;align-items:center;gap:1px;
  background:#1e2035;border-radius:7px;padding:3px 5px;
  box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:9000;pointer-events:auto;
  border:1px solid rgba(255,255,255,.08)
}
#fmt-bar.vis{display:flex}
.fmtb{
  width:26px;height:26px;border:none;background:transparent;color:#cdd6f4;
  cursor:pointer;border-radius:4px;font-size:12px;line-height:1;
  display:flex;align-items:center;justify-content:center;font-family:var(--fs);transition:background .1s
}
.fmtb:hover,.fmtb.on{background:rgba(255,255,255,.18)}
.fmtvsep{width:1px;height:14px;background:rgba(255,255,255,.12);margin:0 3px}
.fmt-clr{
  width:14px;height:14px;border-radius:3px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.25);display:inline-block;transition:transform .1s;flex-shrink:0
}
.fmt-clr:hover{transform:scale(1.25);border-color:#fff}
#fmt-colors{display:flex;gap:3px;align-items:center}
.fmtb-u{text-decoration:underline}
.fmt-clr-clear{background:linear-gradient(135deg,#f00 33%,#0c0 66%,#00f)}

/* ── Preview responsive full-height ── */
#pouter.pv-resp{align-items:stretch}
#pouter.pv-resp #pfwrap{height:100%}
#pouter.pv-resp #pframe{min-height:0;height:100%}

/* ── Paragraph alignment row ── */
.align-row{display:flex;gap:2px;margin-top:5px;padding-top:4px;border-top:.5px solid var(--bl)}
.abtn{
  display:flex;align-items:center;justify-content:center;gap:2px;padding:2px 6px;
  border:1px solid var(--bm);border-radius:var(--r4);background:transparent;
  color:var(--t2);cursor:pointer;font-size:10px;line-height:1;transition:all .1s
}
.abtn svg{width:11px;height:11px;flex-shrink:0}
.abtn:hover{background:var(--acl);color:var(--ac);border-color:var(--acb)}
.abtn.on{background:var(--ac);color:#fff;border-color:var(--acd)}
</style>
</head>
<body>
<div id="app">

<!-- Top Bar -->
<div id="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 3L2 7l10 4 10-4-10-4zM2 17l10 4 10-4M2 12l10 4 10-4"/>
    </svg>
    论文编辑器
  </div>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-import">📂 导入</button>
  <button class="tbtn" id="btn-export">📄 导出</button>
  <button class="tbtn" id="btn-copy">📋 复制代码</button>
  <div class="vsep"></div>
  <button class="tbtn" id="btn-clear">🗑 清空</button>
  <div class="spacer"></div>
  <span style="font-size:11px;color:var(--t2)" id="bcount">0 个块</span>
</div>

<!-- Left Panel -->
<div id="lpanel">
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="tg">
      <button class="tbtn2" data-insert="h1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H1</button>
      <button class="tbtn2" data-insert="h2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H2</button>
      <button class="tbtn2" data-insert="h3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H3</button>
      <button class="tbtn2" data-insert="h4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H4</button>
      <button class="tbtn2" data-insert="h5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12h16M4 6v12M20 6v12"/></svg>H5</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-insert="p"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h12M4 18h8"/></svg>段落</button>
      <button class="tbtn2" data-insert="blockquote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>引用</button>
      <button class="tbtn2" data-insert="ul"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>无序</button>
      <button class="tbtn2" data-insert="ol"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>有序</button>
    </div>
    <div class="tg">

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  onload="window._katexReady=true"></script>

<script>
"use strict";
/* =========================================================
   STATE
   ========================================================= */
var _blocks  = [];
var _sel     = null;
var _ctxId   = null;
var _dlgType = null;
var _tblH    = [];
var _tblR    = [];
var _eqMode  = 'block';
var _pvTimer = null;
var _idSeq   = 0;
var _editingBlock = null;
var _syncingFromCode = false; // guard: prevent feedback loop when code drives block updates

function uid() { return 'b' + (++_idSeq); }

/* =========================================================
   BLOCK DEFAULTS
   ========================================================= */
var DEFS = {
  h1:         { label:'H1',      def:'一级标题' },
  h2:         { label:'H2',      def:'二级标题' },
  h3:         { label:'H3',      def:'三级标题' },
  h4:         { label:'H4',      def:'四级标题' },
  h5:         { label:'H5',      def:'五级标题' },
  p:          { label:'段落',    def:'在此输入段落文字……' },
  blockquote: { label:'引用',    def:'引用内容' },
  ul:         { label:'无序列表', def:'列表项 1\n列表项 2\n列表项 3' },
  ol:         { label:'有序列表', def:'步骤一\n步骤二\n步骤三' },
  abstract:   { label:'摘要',    def:'摘要内容……' },
  authors:    { label:'作者',    def:'王某某¹  李某某²\n¹ 某大学电子信息学院' },
  keywords:   { label:'关键词',  def:'关键词A, 关键词B, 关键词C' },
  infobox:    { label:'信息框',  def:'' },
  eq:         { label:'公式块',  def:'' },
  'eq-inline':{ label:'行内公式',def:'' },
  img:        { label:'图片',    def:'' },
  video:      { label:'视频',    def:'' },
  table:      { label:'表格',    def:'' },
  codeblock:  { label:'代码块',  def:'// 代码' },
  refs:       { label:'参考文献',def:'1. 作者, "标题." 期刊, 年份.' },
  divider:    { label:'分割线',  def:'' },
};

function mkBlock(type, data) {
  data = data || {};
  var d = DEFS[type] || { label:type, def:'' };
  return {
    id: uid(), type: type, label: d.label,
    content: (data.content !== undefined) ? data.content : d.def,
    data: Object.assign({}, data)
  };
}

/* =========================================================
   HELPERS
   ========================================================= */
function $id(id) { return document.getElementById(id); }
function mkDiv(cls) { var d = document.createElement('div'); if(cls) d.className = cls; return d; }
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function debounce(fn, ms) {
  var t;
  return function() { var a=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,a);},ms); };
}

/* =========================================================
   BUILD EDITABLE DIV
   Key fix: use textContent (not innerHTML) to set content,
   block Enter key from creating new DOM nodes.
   ========================================================= */
function makeBE(content, placeholder) {
  var d = document.createElement('div');
  d.className = 'be';
  d.contentEditable = 'true';
  d.dataset.ph = placeholder || '';
  d.textContent = content || '';
  d.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault(); // prevent <div> insertion inside block
      // Insert a plain newline at cursor position
      document.execCommand('insertText', false, '\n');
    }
  });
  return d;
}

/* =========================================================
   BUILD RICH EDITABLE DIV (for p, blockquote, abstract, infobox)
   Uses innerHTML so inline formatting tags (<strong>, <em>, etc.)
   are preserved. Ctrl+B/I/S/U apply formatting shortcuts.
   ========================================================= */
function makeRichBE(content, placeholder) {
  var d = document.createElement('div');
  d.className = 'be rich-be';
  d.contentEditable = 'true';
  d.dataset.ph = placeholder || '';
  if (content) d.innerHTML = content;
  d.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.execCommand('insertLineBreak', false, null);
    }
    if (e.ctrlKey || e.metaKey) {
      switch (e.key.toLowerCase()) {
        case 'b': e.preventDefault(); document.execCommand('bold',         false, null); break;
        case 'i': e.preventDefault(); document.execCommand('italic',       false, null); break;
        case 's': e.preventDefault(); e.stopPropagation(); // stop browser save shortcut
                  document.execCommand('strikeThrough', false, null); break;
        case 'u': e.preventDefault(); document.execCommand('underline',    false, null); break;
      }
    }
  });
  return d;
}

/* =========================================================
   INSERT BLOCK — ONLY APPENDS, never re-renders
   ========================================================= */
function insertBlock(type, data) {
  var b = mkBlock(type, data);
  _blocks.push(b);
  _appendBlockEl(b);
  _updateCount();
  syncCode();
  schedPv();
  // scroll & select after paint
  setTimeout(function() {
    var el = $id(b.id);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'nearest'}); setSelected(b.id); }
  }, 40);
  return b;
}

/* =========================================================
   APPEND ONE BLOCK ELEMENT
   Called ONCE per block. Never touches existing elements.
   ========================================================= */
function _appendBlockEl(b) {
  // Remove empty hint if present
  var hint = $id('ehint');
  if (hint && hint.parentNode) hint.parentNode.removeChild(hint);

  var el = document.createElement('div');
  el.id = b.id;
  el.className = 'bi bi-' + b.type;

  // ── Left gutter controls ──
  var ctrl = mkDiv('bctrl');
  var btnUp = document.createElement('button'); btnUp.className='bcb'; btnUp.title='上移'; btnUp.textContent='↑';
  var btnDn = document.createElement('button'); btnDn.className='bcb'; btnDn.title='下移'; btnDn.textContent='↓';
  btnUp.addEventListener('click', function(e){ e.stopPropagation(); moveBlock(b.id,-1); });
  btnDn.addEventListener('click', function(e){ e.stopPropagation(); moveBlock(b.id, 1); });
  ctrl.appendChild(btnUp); ctrl.appendChild(btnDn);
  el.appendChild(ctrl);

  // ── Badge ──
  var badge = document.createElement('span');
  badge.className = 'btbadge'; badge.textContent = b.label;
  el.appendChild(badge);

  // ── Inner content ──
  var inner = mkDiv('binn');
  _buildInner(inner, b);
  el.appendChild(inner);

  // ── Events ──
  el.addEventListener('click', function(){ setSelected(b.id); });
  el.addEventListener('contextmenu', function(e){ e.preventDefault(); _openCtx(e, b.id); });

  $id('blist').appendChild(el);
}

/* =========================================================
   BUILD INNER — populates .binn for a block
   For text-editable blocks: create one .be, attach ONE input listener.
   For media/eq/table blocks: show info + edit button.
   ========================================================= */
function _buildInner(inner, b) {
  inner.innerHTML = '';

  function addEditBtn(label, fn) {
    var btn = document.createElement('button');
    btn.className = 'edit-btn'; btn.textContent = '✏ ' + label;
    btn.addEventListener('click', function(e){ e.stopPropagation(); fn(b); });
    inner.appendChild(btn);
  }

  function addBE(content, placeholder, onChange) {
    var d = makeBE(content, placeholder);
    inner.appendChild(d);
    d.addEventListener('input', function() { onChange(d.innerText); syncCode(); schedPv(); });
    return d;
  }

  function addRichBE(content, placeholder, onChange) {
    var d = makeRichBE(content, placeholder);
    inner.appendChild(d);
    d.addEventListener('input', function() { onChange(d.innerHTML); syncCode(); schedPv(); });
    return d;
  }

  switch (b.type) {
    case 'h1': case 'h2': case 'h3': case 'h4': case 'h5':
      addBE(b.content, '输入标题…', function(v){ b.content=v; });
      break;

    case 'p': {
      addRichBE(b.content, '输入段落文字…', function(v){ b.content=v; });
      var alignRow = mkDiv('align-row');
      var ALIGNS = [
        { v:'left',    label:'左对齐',   svg:'<svg viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="2" x2="12" y2="2"/><line x1="0" y1="5" x2="8" y2="5"/><line x1="0" y1="8" x2="10" y2="8"/></svg>' },
        { v:'center',  label:'居中',     svg:'<svg viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="2" x2="12" y2="2"/><line x1="2" y1="5" x2="10" y2="5"/><line x1="1" y1="8" x2="11" y2="8"/></svg>' },
        { v:'right',   label:'右对齐',   svg:'<svg viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="2" x2="12" y2="2"/><line x1="4" y1="5" x2="12" y2="5"/><line x1="2" y1="8" x2="12" y2="8"/></svg>' },
        { v:'justify', label:'两端对齐', svg:'<svg viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="2" x2="12" y2="2"/><line x1="0" y1="5" x2="12" y2="5"/><line x1="0" y1="8" x2="12" y2="8"/></svg>' },
      ];
      ALIGNS.forEach(function(a) {
        var btn = document.createElement('button');
        btn.className = 'abtn' + (b.data.align === a.v ? ' on' : '');
        btn.innerHTML = a.svg + a.label;
        btn.title = a.label;
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          b.data.align = (b.data.align === a.v) ? '' : a.v;
          alignRow.querySelectorAll('.abtn').forEach(function(ab){ ab.classList.remove('on'); });
          if (b.data.align) btn.classList.add('on');
          syncCode(); schedPv();
        });
        alignRow.appendChild(btn);
      });
      inner.appendChild(alignRow);
      break;
    }

    case 'blockquote': {
      var wrap = mkDiv('bqx'); inner.appendChild(wrap);
      var d = makeRichBE(b.content, '引用文字…');
      wrap.appendChild(d);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      break;
    }
    case 'ul': case 'ol': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent = b.type==='ul' ? '无序列表（每行一项）' : '有序列表（每行一项）';
      inner.appendChild(lbl);
      addBE(b.content, '列表项…', function(v){ b.content=v; });
      break;
    }
    case 'abstract': {
      var wrap = mkDiv('abx'); inner.appendChild(wrap);
      var tit = mkDiv('abxtit'); tit.textContent='Abstract / 摘要'; wrap.appendChild(tit);
      var d = makeRichBE(b.content, '摘要内容…');
      wrap.appendChild(d);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      break;
    }
    case 'authors': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent='作者 · 机构（换行分隔）'; inner.appendChild(lbl);
      addBE(b.content, '作者信息…', function(v){ b.content=v; });
      break;
    }
    case 'keywords': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent='关键词（逗号分隔）'; inner.appendChild(lbl);
      addBE(b.content, '关键词A, 关键词B…', function(v){ b.content=v; });
      break;
    }
    case 'infobox': {
      var colors = {
        info:  {bg:'var(--acl)', bd:'var(--acb)', tc:'var(--acd)'},
        ok:    {bg:'#EAF3DE',   bd:'#C0DD97',    tc:'#27500A'},
        warn:  {bg:'#FAEEDA',   bd:'#FAC775',    tc:'#633806'},
        error: {bg:'#FCEBEB',   bd:'#F7C1C1',    tc:'#791F1F'},
        note:  {bg:'var(--bg1)',bd:'var(--bm)',   tc:'var(--t0)'},
      };
      var c = colors[b.data.ibType||'info'] || colors.info;
      var wrap = mkDiv('ibx');
      wrap.style.background=c.bg; wrap.style.border='.5px solid '+c.bd;
      var tit = mkDiv('ibxtit'); tit.style.color=c.tc;
      tit.textContent = b.data.ibTitle || '提示'; wrap.appendChild(tit);
      var d = makeRichBE(b.content, '内容…'); d.style.color=c.tc; wrap.appendChild(d);
      inner.appendChild(wrap);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      addEditBtn('修改信息框', openInfoboxDialog);
      break;
    }
    case 'eq': {
      var wrap = mkDiv('eqx'); inner.appendChild(wrap);
      var lbl = document.createElement('span'); lbl.className='eqlbl';
      lbl.textContent = '公式块'+(b.data.label?' · '+b.data.label:''); wrap.appendChild(lbl);
      var raw = mkDiv('eqraw'); raw.textContent = b.data.raw||'(空公式)'; wrap.appendChild(raw);
      addEditBtn('编辑公式', function(bl){ openEqDialog('block', bl); });
      break;
    }
    case 'eq-inline': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent='行内公式'; inner.appendChild(lbl);
      var sp = document.createElement('span'); sp.className='iqx';
      sp.textContent = b.data.raw||'(空)'; inner.appendChild(sp);
      addEditBtn('编辑', function(bl){ openEqDialog('inline', bl); });
      break;
    }
    case 'img': {
      var wrap = mkDiv('imgx'); inner.appendChild(wrap);

    }

}

/* refresh inner of an existing block element */
function _refreshInner(b) {
  var el = $id(b.id);
  if (!el) return;
  var inner = el.querySelector('.binn');
  if (inner) _buildInner(inner, b);
}

/* =========================================================
   SELECTION
   ========================================================= */
function setSelected(id) {
  if (_sel) { var p=$id(_sel); if(p) p.classList.remove('sel'); }
  _sel = id;
  if (id) { var el=$id(id); if(el) el.classList.add('sel'); }
}

/* =========================================================
   MOVE / DELETE / DUPLICATE
   ========================================================= */
function moveBlock(id, dir) {
  var i = _blocks.findIndex(function(b){ return b.id===id; });
  if (i<0) return;
  var ni = i+dir;
  if (ni<0 || ni>=_blocks.length) return;
  var tmp=_blocks[i]; _blocks[i]=_blocks[ni]; _blocks[ni]=tmp;
  // Re-order DOM nodes without re-rendering
  var bl = $id('blist');
  var els = Array.from(bl.querySelectorAll('.bi'));
  if (dir===-1) bl.insertBefore(els[i], els[ni]);
  else          bl.insertBefore(els[ni], els[i]);
  syncCode(); schedPv();
}

function deleteBlock(id) {
  var el=$id(id); if(el) el.remove();
  _blocks = _blocks.filter(function(b){ return b.id!==id; });
  if (_sel===id) _sel=null;
  _updateCount(); syncCode(); schedPv();
}

function duplicateBlock(id) {
  var src=_blocks.find(function(b){ return b.id===id; }); if(!src) return;
  var copy = JSON.parse(JSON.stringify(src)); copy.id=uid();
  var i=_blocks.findIndex(function(b){ return b.id===id; });
  _blocks.splice(i+1,0,copy);
  var origEl=$id(id);
  // Build new element
  var newEl=document.createElement('div'); newEl.id=copy.id; newEl.className='bi bi-'+copy.type;
  var ctrl=mkDiv('bctrl');
  var bu=document.createElement('button'); bu.className='bcb'; bu.textContent='↑';
  var bd=document.createElement('button'); bd.className='bcb'; bd.textContent='↓';
  bu.addEventListener('click',function(e){e.stopPropagation();moveBlock(copy.id,-1);});
  bd.addEventListener('click',function(e){e.stopPropagation();moveBlock(copy.id, 1);});
  ctrl.appendChild(bu); ctrl.appendChild(bd); newEl.appendChild(ctrl);
  var badge=document.createElement('span'); badge.className='btbadge'; badge.textContent=copy.label; newEl.appendChild(badge);
  var inner=mkDiv('binn'); _buildInner(inner,copy); newEl.appendChild(inner);
  newEl.addEventListener('click',function(){setSelected(copy.id);});
  newEl.addEventListener('contextmenu',function(e){e.preventDefault();_openCtx(e,copy.id);});
  if(origEl&&origEl.nextSibling) origEl.parentNode.insertBefore(newEl,origEl.nextSibling);
  else $id('blist').appendChild(newEl);
  _updateCount(); syncCode(); schedPv();
}

function _updateCount() {
  $id('bcount').textContent = _blocks.length + ' 个块';
  if (_blocks.length===0) {
    var bl=$id('blist'); bl.innerHTML='';
    var h=document.createElement('div'); h.id='ehint';
    h.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:28px;height:28px;opacity:.35"><path d="M12 5v14M5 12h14"/></svg><div>使用上方工具栏插入组件块</div><div style="font-size:10px;opacity:.6">每个组件独立生成代码片段</div>';
    bl.appendChild(h);
  }
}

/* =========================================================
   CODE SYNC  blocks → textarea
   ========================================================= */
function syncCode() {
  if (_syncingFromCode) return; // code is driving; don't overwrite textarea
  var body = _blocks.map(b2html).join('\n\n');
  var full = wrapHTML(body);
  $id('ctarea').value = full;
  $id('cchars').textContent = full.length + ' chars';
}

function b2html(b) {
  switch(b.type) {
    case 'h1': case 'h2': case 'h3': case 'h4': case 'h5':
      return '  <'+b.type+'>'+b.content+'</'+b.type+'>';
    case 'p':
    case 'p': {
      var pstyle = b.data.align ? ' style="text-align:'+b.data.align+'"' : '';
      return '  <p'+pstyle+'>'+b.content+'</p>';
    }
    case 'blockquote':
      return '  <blockquote>\n    <p>'+b.content+'</p>\n  </blockquote>';
    case 'ul': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return '    <li>'+s.trim()+'</li>';}).join('\n');
      return '  <ul>\n'+items+'\n  </ul>';
    }
    case 'ol': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return '    <li>'+s.trim()+'</li>';}).join('\n');
      return '  <ol>\n'+items+'\n  </ol>';
    }
    case 'abstract':
      return '  <div class="abstract-box">\n    <div class="abs-title">摘要</div>\n    <p>'+b.content+'</p>\n  </div>';
    case 'authors': {
      var lines=b.content.split('\n');
      var a=lines[0]||''; var f=lines[1]||'';
      return '  <p class="paper-authors">'+a+'</p>'+(f?'\n  <p class="paper-affil">'+f+'</p>':'');
    }
    case 'keywords': {
      var kws=b.content.split(',').map(function(k){return k.trim();}).filter(Boolean);
      return '  <div class="kw-row">\n'+kws.map(function(k){return '    <span class="kw">'+k+'</span>';}).join('\n')+'\n  </div>';
    }
    case 'infobox': {
      var m={info:'b-info',ok:'b-ok',warn:'b-warn',error:'b-err',note:'b-note'};
      var cls=m[b.data.ibType||'info']||'b-info';
      return '  <div class="ib '+cls+'">\n    <div class="bt">'+(b.data.ibTitle||'提示')+'</div>\n    <p>'+b.content+'</p>\n  </div>';
    }
    case 'eq': {
      var lbl=b.data.label?' data-eqlabel="'+b.data.label+'"':'';
      return '  <div class="eq"'+lbl+'>\n    $$'+(b.data.raw||'')+'$$\n  </div>';
    }
    case 'eq-inline':
      return '  <p>$'+(b.data.raw||'')+'$</p>';
    case 'img': {
      var d=b.data; var src=d.src||''; var alt=d.alt||''; var cap=d.caption||''; var fn=d.fignum||'';
      return '  <figure class="af">\n    <div class="iw">\n      <div class="img-body">\n        <img src="'+src+'" alt="'+alt+'" loading="lazy">\n      </div>\n      <figcaption>'+(fn?'<span>'+fn+'</span>：':'')+cap+'</figcaption>\n    </div>\n  </figure>';
    }
    case 'video': {
      var d=b.data; var src=d.src||''; var cap=d.caption||''; var fn=d.fignum||'';
      var media=d.vtype==='iframe'
        ?'      <iframe src="'+src+'" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"></iframe>'
        :'      <video controls>\n        <source src="'+src+'" type="video/mp4">\n        您的浏览器不支持 video 标签。\n      </video>';
      return '  <figure class="vw">\n    <div class="vbox">\n'+media+'\n    </div>\n    <figcaption>'+(fn?'<span>'+fn+'</span>：':'')+cap+'</figcaption>\n  </figure>';
    }
    case 'table': {
      var d=b.data; var h=d.headers||[]; var r=d.rows||[]; var cap=d.caption||''; var tn=d.tablenum||'';
      var s='  <div class="tw">\n';
      if(cap) s+='    <p class="tc">'+(tn?'<span>'+tn+'</span>：':'')+cap+'</p>\n';
      s+='    <div class="t-scroll">\n    <table class="at">\n      <thead>\n        <tr>'+h.map(function(hh){return'<th>'+hh+'</th>';}).join('')+'</tr>\n      </thead>\n      <tbody>\n';
      r.forEach(function(row){ s+='        <tr>'+h.map(function(_,i){return'<td>'+(row[i]||'')+'</td>';}).join('')+'</tr>\n'; });
      s+='      </tbody>\n    </table>\n    </div>\n  </div>';
      return s;
    }
    case 'codeblock':
      return '  <div class="cbw">\n    <div class="ch"><span class="cl">'+(b.data.lang||'code')+'</span></div>\n    <pre><code>'+b.content+'</code></pre>\n  </div>';
    case 'refs': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return'      <li>'+s.trim()+'</li>';}).join('\n');
      return '  <div class="refs">\n    <h2>参考文献</h2>\n    <ol>\n'+items+'\n    </ol>\n  </div>';
    }
    case 'divider':
      return '  <hr style="border:none;border-top:0.5px solid var(--color-border-tertiary);margin:2rem 0;">';
    default:
      return '  <!-- '+b.type+' -->';
  }
}

/* =========================================================
   CODE → BLOCKS SYNC  (parse textarea HTML → rebuild _blocks + DOM)
   ========================================================= */
function parseHtmlToBlocks(htmlStr) {
  if (!htmlStr || !htmlStr.trim()) return [];
  var doc;
  try { doc = new DOMParser().parseFromString(htmlStr, 'text/html'); } catch(e) { console.error('HTML parse error:', e); return null; }
  var ar = doc.querySelector('.ar');
  if (!ar) return null;
  var children = Array.prototype.slice.call(ar.children);
  var blocks = [];
  var i = 0;
  // Helper: extract numbered caption from a figcaption/tc element
  function capInfo(container) {
    if (!container) return { cap: '', num: '' };
    var sp = container.querySelector('span');
    if (sp) return { cap: container.textContent.replace(sp.textContent, '').replace(/^[：:]\s*/, '').trim(), num: sp.textContent.trim() };
    return { cap: container.textContent.trim(), num: '' };
  }
  while (i < children.length) {
    var el = children[i];
    var tag = el.tagName.toLowerCase();

    // Divider
    if (tag === 'hr') {
      blocks.push(mkBlock('divider', {}));
      i++; continue;
    }

    // Headings h1-h5
    if (/^h[1-5]$/.test(tag)) {
      blocks.push(mkBlock(tag, { content: el.textContent }));
      i++; continue;
    }

    // Paragraph – several subtypes
    if (tag === 'p') {
      if (el.classList.contains('paper-authors')) {
        var authContent = el.textContent;
        if (i + 1 < children.length && children[i + 1].classList.contains('paper-affil')) {
          authContent += '\n' + children[i + 1].textContent;
          i++;
        }
        blocks.push(mkBlock('authors', { content: authContent }));
        i++; continue;
      }
      if (el.classList.contains('paper-affil')) { i++; continue; } // consumed above
      // Inline equation: entire text is $raw$
      var txt = el.textContent.trim();
      if (txt.length > 2 && txt[0] === '$' && txt[txt.length - 1] === '$' && txt.indexOf('\n') === -1) {
        blocks.push(mkBlock('eq-inline', { raw: txt.slice(1, -1) }));
        i++; continue;
      }
      blocks.push(mkBlock('p', { content: el.innerHTML, align: el.style.textAlign || '' }));
      i++; continue;
    }

    // Blockquote
    if (tag === 'blockquote') {
      var bqp = el.querySelector('p');
      blocks.push(mkBlock('blockquote', { content: bqp ? bqp.innerHTML : el.innerHTML }));
      i++; continue;
    }

    // Lists
    if (tag === 'ul') {
      var uls = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
      blocks.push(mkBlock('ul', { content: uls.join('\n') }));
      i++; continue;
    }
    if (tag === 'ol') {
      var ols = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
      blocks.push(mkBlock('ol', { content: ols.join('\n') }));
      i++; continue;
    }

    // Figures – image or video
    if (tag === 'figure') {
      if (el.classList.contains('af')) {
        var img = el.querySelector('img');
        var figcap = el.querySelector('figcaption');
        var fc = capInfo(figcap);
        blocks.push(mkBlock('img', { src: img ? (img.getAttribute('src') || '') : '', alt: img ? (img.getAttribute('alt') || '') : '', caption: fc.cap, fignum: fc.num }));
        i++; continue;
      }
      if (el.classList.contains('vw')) {
        var vif = el.querySelector('iframe');
        var vsrc = el.querySelector('video source');
        var vfc = capInfo(el.querySelector('figcaption'));
        blocks.push(mkBlock('video', { vtype: vif ? 'iframe' : 'file', src: vif ? (vif.getAttribute('src') || '') : (vsrc ? (vsrc.getAttribute('src') || '') : ''), caption: vfc.cap, fignum: vfc.num }));
        i++; continue;
      }
      i++; continue;
    }

    // Divs with class-based type detection
    if (tag === 'div') {
      if (el.classList.contains('abstract-box')) {
        var absp = el.querySelector('p');
        blocks.push(mkBlock('abstract', { content: absp ? absp.innerHTML : '' }));
        i++; continue;
      }
      if (el.classList.contains('kw-row')) {
        var kws = Array.prototype.slice.call(el.querySelectorAll('.kw')).map(function(s){ return s.textContent.trim(); });
        blocks.push(mkBlock('keywords', { content: kws.join(', ') }));
        i++; continue;
      }
      if (el.classList.contains('ib')) {
        var typeMap = { 'b-info': 'info', 'b-ok': 'ok', 'b-warn': 'warn', 'b-err': 'error', 'b-note': 'note' };
        var ibType = 'info';
        Object.keys(typeMap).forEach(function(cls) { if (el.classList.contains(cls)) ibType = typeMap[cls]; });
        var ibt = el.querySelector('.bt');
        var ibp = el.querySelector('p');
        blocks.push(mkBlock('infobox', { ibType: ibType, ibTitle: ibt ? ibt.textContent.trim() : '提示', content: ibp ? ibp.innerHTML : '' }));
        i++; continue;
      }
      if (el.classList.contains('eq')) {
        var eqRaw = el.textContent.trim().replace(/^\$\$/, '').replace(/\$\$$/, '').trim();
        var eqLabel = el.getAttribute('data-eqlabel') || '';
        blocks.push(mkBlock('eq', { raw: eqRaw, label: eqLabel }));
        i++; continue;
      }
      if (el.classList.contains('tw')) {
        var tbl = el.querySelector('table');
        var headers = [], rows = [];
        var tci = capInfo(el.querySelector('.tc'));
        if (tbl) {
          headers = Array.prototype.slice.call(tbl.querySelectorAll('thead th')).map(function(th){ return th.textContent.trim(); });
          rows = Array.prototype.slice.call(tbl.querySelectorAll('tbody tr')).map(function(tr){
            return Array.prototype.slice.call(tr.querySelectorAll('td')).map(function(td){ return td.textContent.trim(); });
          });
        }
        blocks.push(mkBlock('table', { headers: headers, rows: rows, caption: tci.cap, tablenum: tci.num }));
        i++; continue;
      }
      if (el.classList.contains('cbw')) {
        var cbcl = el.querySelector('.cl');
        var cbcode = el.querySelector('pre code');
        blocks.push(mkBlock('codeblock', { lang: cbcl ? cbcl.textContent.trim() : 'code', content: cbcode ? cbcode.textContent : '' }));
        i++; continue;
      }
      if (el.classList.contains('refs')) {
        var refItems = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
        blocks.push(mkBlock('refs', { content: refItems.join('\n') }));
        i++; continue;
      }
    }

    i++;
  }
  return blocks;
}

var _codeParseTimer = null;
function schedApplyCode() {
  clearTimeout(_codeParseTimer);
  _codeParseTimer = setTimeout(applyCodeToBlocks, 600);
}
function applyCodeToBlocks() {
  var newBlocks = parseHtmlToBlocks($id('ctarea').value);
  if (!newBlocks) return; // couldn't parse (no .ar wrapper) – leave blocks as-is
  _syncingFromCode = true;
  _blocks = newBlocks;
  _sel = null;
  var bl = $id('blist');
  bl.innerHTML = '';
  _blocks.forEach(function(b) { _appendBlockEl(b); });
  _updateCount();
  _syncingFromCode = false;
}

(function(){
  var bar = $id('fmt-bar');
  var _savedRange = null;
  var _hideFmtTimer = null;

  // Prevent focus loss when clicking format buttons (keep selection in rich-be)
  bar.addEventListener('mousedown', function(e) {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) _savedRange = sel.getRangeAt(0).cloneRange();
    e.preventDefault(); // don't move focus away from the contentEditable
  });

  function restoreSel() {
    if (_savedRange) {
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(_savedRange);
    }
  }

  // Trigger syncCode after execCommand (execCommand fires 'input' in most browsers,
  // but dispatch manually to be safe after we restore selection)
  function afterFormat() {
    var el = document.activeElement;
    while (el && el !== document.body) {
      if (el.classList && el.classList.contains('rich-be')) {
        el.dispatchEvent(new Event('input', { bubbles: true }));
        break;
      }
      el = el.parentNode;
    }
  }

  $id('fmt-b').addEventListener('click', function() { restoreSel(); document.execCommand('bold',         false, null); afterFormat(); });
  $id('fmt-i').addEventListener('click', function() { restoreSel(); document.execCommand('italic',       false, null); afterFormat(); });
  $id('fmt-s').addEventListener('click', function() { restoreSel(); document.execCommand('strikeThrough',false, null); afterFormat(); });
  $id('fmt-u').addEventListener('click', function() { restoreSel(); document.execCommand('underline',    false, null); afterFormat(); });

  document.querySelectorAll('.fmt-clr').forEach(function(sw) {
    sw.addEventListener('click', function() {
      restoreSel();
      var c = sw.dataset.c;
      if (c) {
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, c);
        document.execCommand('styleWithCSS', false, false);
      } else {
        // Empty data-c = clear color only (don't remove other formatting)
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, 'inherit');
        document.execCommand('styleWithCSS', false, false);
      }
      afterFormat();
    });
  });

  function nodeInRichBE(node) {
    while (node && node !== document.body) {
      if (node.classList && node.classList.contains('rich-be')) return node;
      node = node.parentNode;
    }
    return null;
  }

  document.addEventListener('selectionchange', function() {
    clearTimeout(_hideFmtTimer);
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
      _hideFmtTimer = setTimeout(function() { bar.classList.remove('vis'); }, 120);
      return;
    }
    var rb = nodeInRichBE(sel.anchorNode);
    if (!rb) { _hideFmtTimer = setTimeout(function() { bar.classList.remove('vis'); }, 120); return; }

    var range = sel.getRangeAt(0);
    var rect = range.getBoundingClientRect();
    if (!rect.width && !rect.height) { bar.classList.remove('vis'); return; }

    bar.classList.add('vis');
    var bw = bar.offsetWidth || 200;
    var bh = bar.offsetHeight || 34;
    var left = Math.max(4, Math.min(rect.left + rect.width / 2 - bw / 2, window.innerWidth - bw - 4));
    var top  = rect.top - bh - 8;
    if (top < 4) top = rect.bottom + 8;
    bar.style.left = left + 'px';
    bar.style.top  = top  + 'px';

    // Reflect active state of format commands
    try {
      $id('fmt-b').classList.toggle('on', document.queryCommandState('bold'));
      $id('fmt-i').classList.toggle('on', document.queryCommandState('italic'));
      $id('fmt-s').classList.toggle('on', document.queryCommandState('strikeThrough'));
      $id('fmt-u').classList.toggle('on', document.queryCommandState('underline'));
    } catch(e) { /* queryCommandState may throw in sandboxed contexts; safe to ignore */ }
  });
})();

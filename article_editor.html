<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文模板编辑器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#2644ba;--acl:#e8ecf9;--acm:#8fa0dc;--acd:#1a3090;--acb:#b8c4ec;
  --bg0:#fff;--bg1:#f5f5f3;--bg2:#eeede9;--bge:#1e1e2e;
  --t0:#1a1a18;--t1:#5f5e5a;--t2:#888780;
  --bl:rgba(0,0,0,0.08);--bm:rgba(0,0,0,0.14);
  --fs:-apple-system,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --fm:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --r4:4px;--r8:8px;--r12:12px
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fs);background:var(--bg2);color:var(--t0);-webkit-font-smoothing:antialiased}

/* ── Layout ── */
#app{display:grid;grid-template-rows:46px 1fr;grid-template-columns:1fr 1fr;height:100vh}
#topbar{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:#fff;border-bottom:1px solid var(--bl);box-shadow:0 1px 3px rgba(0,0,0,.05);z-index:100
}
.logo{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--ac);letter-spacing:-.02em}
.logo svg{width:20px;height:20px}
.vsep{width:1px;height:18px;background:var(--bm);margin:0 2px}
.tbtn{
  padding:4px 10px;border-radius:var(--r4);border:1px solid var(--bm);background:#fff;
  font-size:12px;font-family:var(--fs);color:var(--t1);cursor:pointer;transition:all .12s;white-space:nowrap
}
.tbtn:hover{background:var(--bg1);color:var(--t0)}
.tbtn.prim{background:var(--ac);color:#fff;border-color:var(--acd)}
.spacer{flex:1}

/* ── Left panel ── */
#lpanel{
  display:flex;flex-direction:column;border-right:1px solid var(--bm);
  background:var(--bg1);overflow:hidden;min-width:0
}

/* ── Toolbar ── */
#toolbar{
  background:#fff;border-bottom:1px solid var(--bl);
  padding:5px 8px;display:flex;flex-wrap:wrap;gap:2px;align-items:center;flex-shrink:0
}
.tg{display:flex;align-items:center;gap:1px;padding-right:6px;border-right:1px solid var(--bl)}
.tg:last-child{border-right:none;padding-right:0}
.tbtn2{
  display:flex;align-items:center;justify-content:center;gap:3px;padding:4px 6px;
  border:none;background:transparent;border-radius:var(--r4);
  font-size:11px;font-family:var(--fs);color:var(--t1);cursor:pointer;transition:all .1s;white-space:nowrap;line-height:1
}
.tbtn2:hover{background:var(--acl);color:var(--ac)}
.tbtn2 svg{width:13px;height:13px;flex-shrink:0}

/* ── Block editor ── */
#beditor{flex:1;overflow-y:auto;padding:12px 12px 12px 38px;background:#fff;min-height:0}
#blist{display:flex;flex-direction:column;gap:3px;min-height:100%}

/* Empty hint */
#ehint{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;color:var(--t2);font-size:12px;gap:8px;text-align:center
}
#ehint svg{width:28px;height:28px;opacity:.35}

/* Block item */
.bi{
  position:relative;border-radius:var(--r4);border:1.5px solid transparent;transition:border-color .1s
}
.bi:hover{border-color:var(--acb)}
.bi.sel{border-color:var(--ac);background:rgba(38,68,186,.03)}

/* Block controls (left gutter) */
.bctrl{
  position:absolute;left:-30px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:2px;opacity:0;transition:opacity .1s
}
.bi:hover .bctrl{opacity:1}
.bcb{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border:none;background:#fff;border-radius:var(--r4);color:var(--t2);cursor:pointer;
  font-size:10px;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:all .1s
}
.bcb:hover{color:var(--ac);background:var(--acl)}
.bdrag{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  cursor:grab;border-radius:var(--r4);color:var(--t2);font-size:12px;
  user-select:none;transition:all .1s
}
.bdrag:hover{color:var(--ac);background:var(--acl)}
.bdrag:active{cursor:grabbing}
.bi.drag-over{outline:2px dashed var(--acm);outline-offset:1px;background:rgba(38,68,186,.04)}

/* Block type badge */
.btbadge{
  position:absolute;right:5px;top:3px;font-size:9px;font-weight:600;color:var(--acm);
  opacity:0;pointer-events:none;text-transform:uppercase;letter-spacing:.05em;transition:opacity .1s
}
.bi:hover .btbadge{opacity:1}

/* Block inner */
.binn{padding:6px 8px}

/* Editable divs inside blocks */
.be{
  outline:none;width:100%;min-height:1.4em;font-family:var(--fs);font-size:13px;
  line-height:1.7;color:var(--t0);border:none;background:transparent;
  word-break:break-word;white-space:pre-wrap
}
.be:empty::before{content:attr(data-ph);color:var(--t2);pointer-events:none}

/* heading styles */
.bi-h1 .be{font-size:1.15rem;font-weight:700}
.bi-h2 .be{font-size:1rem;font-weight:700;color:var(--ac)}
.bi-h3 .be{font-size:.95rem;font-weight:600}
.bi-h4 .be{font-size:.88rem;font-weight:500;color:var(--t1)}
.bi-h5 .be{font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)}

/* Abstract preview */
.abx{background:var(--acl);border:.5px solid var(--acb);border-radius:var(--r8);padding:8px 12px}
.abxtit{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ac);margin-bottom:5px}
.abx .be{font-size:12px;color:var(--acd)}

/* Blockquote */
.bqx{border-left:3px solid var(--ac);background:var(--acl);border-radius:0 var(--r8) var(--r8) 0;padding:7px 10px}
.bqx .be{font-style:italic;color:var(--acd);font-size:13px}

/* Infobox preview */
.ibx{border-radius:var(--r8);padding:7px 10px}
.ibxtit{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}

/* Eq block */
.eqx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r8);padding:7px 12px;text-align:center}
.eqx .eqlbl{font-size:9px;color:var(--t2);display:block;text-align:left;margin-bottom:3px}
.eqx .eqraw{font-family:var(--fm);font-size:12px;color:var(--t0)}

/* Inline eq */
.iqx{display:inline-block;background:var(--bg1);border:.5px solid var(--bm);border-radius:4px;padding:2px 7px;font-family:var(--fm);font-size:12px}

/* Image preview */
.imgx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r12);overflow:hidden}
.imgph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:14px;color:var(--t2);font-size:11px}
.imgph svg{width:24px;height:24px;opacity:.4}
.imgcap{border-top:.5px solid var(--bm);background:var(--bg2);padding:4px 10px;font-size:11px;text-align:center;color:var(--t1)}

/* Video preview */
.vidx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r12);overflow:hidden}
.vidph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#111;padding:18px;color:#777;font-size:11px}
.vidph svg{width:28px;height:28px;opacity:.4}
.vidcap{border-top:.5px solid var(--bm);background:var(--bg2);padding:4px 10px;font-size:11px;text-align:center;color:var(--t1)}

/* Table preview */
.tblx{overflow-x:auto;border:.5px solid var(--bm);border-radius:var(--r8)}
.tblx table{border-collapse:collapse;font-size:11px;width:100%}
.tblx th{background:var(--acl);color:var(--acd);font-weight:500;padding:5px 9px;text-align:left;border-bottom:.5px solid var(--acb);white-space:nowrap}
.tblx td{padding:4px 9px;border-bottom:.5px solid var(--bl);white-space:nowrap}
.tblx tr:nth-child(even) td{background:var(--bg1)}
.tblcap{font-size:10px;color:var(--t2);margin-bottom:4px}

/* Code block preview */
.cbx{background:var(--bg1);border:.5px solid var(--bm);border-radius:var(--r8);overflow:hidden}
.cbxh{display:flex;align-items:center;justify-content:space-between;padding:3px 9px;background:var(--bg2);border-bottom:.5px solid var(--bm);font-size:10px;color:var(--t2)}
.cbx .be{font-family:var(--fm);font-size:11px;background:var(--bg1);padding:7px 9px;line-height:1.6}

/* Resize handle */
#rhandle{
  height:7px;background:var(--bg2);border-top:1px solid var(--bl);border-bottom:1px solid var(--bl);
  cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none
}
#rhandle::before{content:'';width:28px;height:2px;background:var(--bm);border-radius:2px}
#rhandle:hover::before{background:var(--acm)}

/* Code editor */
#cewrap{display:flex;flex-direction:column;overflow:hidden;background:#fff;min-height:0;height:200px}
#cehead{
  display:flex;align-items:center;gap:7px;padding:4px 12px;background:var(--bg1);
  border-bottom:1px solid var(--bl);flex-shrink:0
}
#cehead span{font-size:10px;color:var(--t2);font-family:var(--fm)}
.dot{width:8px;height:8px;border-radius:50%}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
#ctarea{
  flex:1;background:#fff;color:var(--t0);border:none;outline:none;
  padding:12px 14px;font-family:var(--fm);font-size:12px;line-height:1.65;
  resize:none;overflow-y:auto;white-space:pre;tab-size:2;min-height:0
}

/* ── Right panel (preview) ── */
#rpanel{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
#pbar{
  display:flex;align-items:center;gap:5px;padding:0 10px;
  background:#fff;border-bottom:1px solid var(--bl);flex-shrink:0;height:42px;overflow-x:auto
}
.pbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-right:3px;white-space:nowrap}
.dbtn{
  display:flex;align-items:center;gap:3px;padding:3px 7px;border:1px solid var(--bm);
  border-radius:var(--r4);background:#fff;font-size:11px;font-family:var(--fs);color:var(--t1);
  cursor:pointer;transition:all .1s;white-space:nowrap
}
.dbtn svg{width:12px;height:12px}
.dbtn:hover{background:var(--acl);color:var(--ac);border-color:var(--acb)}
.dbtn.act{background:var(--ac);color:#fff;border-color:var(--acd)}
#pscale{
  font-size:11px;color:var(--t1);padding:3px 6px;border:1px solid var(--bm);
  border-radius:var(--r4);background:#fff;font-family:var(--fs);cursor:pointer;outline:none
}
#cw,#ch{
  width:54px;padding:3px 5px;border:1px solid var(--bm);border-radius:var(--r4);
  background:#fff;font-size:11px;font-family:var(--fs);color:var(--t0);outline:none;
  text-align:center;display:none
}
#cw:focus,#ch:focus{border-color:var(--acm)}
#cdx{font-size:11px;color:var(--t2);display:none}

/* Preview outer */
#pouter{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(0,0,0,.04) 20px),
    repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(0,0,0,.04) 20px),
    var(--bg2)
}
#pfwrap{transition:width .3s cubic-bezier(.4,0,.2,1),transform .25s;transform-origin:top center;width:100%}
#pframe{
  width:100%;border:1px solid var(--bm);border-radius:var(--r12);
  box-shadow:0 4px 20px rgba(0,0,0,.1);background:#fff;overflow:hidden;min-height:300px;
  display:block
}

/* ── Dialog ── */
#doverlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:1000;align-items:center;justify-content:center
}
#doverlay.open{display:flex}
#dbox{
  background:#fff;border-radius:var(--r12);padding:22px;
  min-width:340px;max-width:520px;width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.2)
}
#dbox h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--t0)}
.df{margin-bottom:10px}
.df label{display:block;font-size:11px;font-weight:500;color:var(--t1);margin-bottom:4px}
.df input,.df select,.df textarea{
  width:100%;padding:6px 9px;border:1px solid var(--bm);border-radius:var(--r4);
  font-size:12px;font-family:var(--fs);color:var(--t0);outline:none;background:#fff
}
.df input:focus,.df select:focus,.df textarea:focus{
  border-color:var(--acm);box-shadow:0 0 0 3px rgba(38,68,186,.1)
}
.df textarea{resize:vertical;min-height:72px}
.dbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.dbtns button{
  padding:6px 14px;border-radius:var(--r4);border:1px solid var(--bm);
  font-size:12px;font-family:var(--fs);cursor:pointer;transition:all .1s
}
.dcancel{background:#fff;color:var(--t1)}
.dcancel:hover{background:var(--bg1)}
.dconfirm{background:var(--ac);color:#fff;border-color:var(--acd)}
.dconfirm:hover{background:var(--acd)}

/* Table builder */
.tbed{overflow-x:auto;max-height:200px;overflow-y:auto}
.tbed table{border-collapse:collapse;font-size:12px}
.tbed th,.tbed td{border:1px solid var(--bm);padding:0}
.tbed th input,.tbed td input{
  border:none;padding:4px 7px;font-size:11px;font-family:var(--fs);
  width:90px;background:transparent;outline:none
}
.tbed th{background:var(--acl)}
.tbed th input{color:var(--acd);font-weight:500}
.tadd{
  padding:3px 9px;border:1px dashed var(--bm);border-radius:var(--r4);
  background:transparent;font-size:11px;color:var(--t2);cursor:pointer
}
.tadd:hover{border-color:var(--acm);color:var(--ac)}
.tbtns{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap}

/* Context menu */
#ctxm{
  display:none;position:fixed;z-index:2000;background:#fff;border:1px solid var(--bm);
  border-radius:var(--r8);padding:3px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:130px
}
#ctxm.open{display:block}
.cxi{
  padding:5px 11px;font-size:11px;color:var(--t0);border-radius:var(--r4);
  cursor:pointer;display:flex;align-items:center;gap:5px
}
.cxi:hover{background:var(--acl);color:var(--ac)}
.cxi.danger:hover{background:#fcebeb;color:#791f1f}
.cxs{height:1px;background:var(--bl);margin:2px 0}

/* Scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--acm)}

/* Eq preview in dialog */
#eqpv{
  border:.5px solid var(--bm);border-radius:var(--r4);padding:8px 12px;
  text-align:center;background:var(--bg1);min-height:38px;font-size:13px;margin-top:5px
}

.edit-btn{
  display:inline-block;margin-top:4px;padding:3px 9px;border:1px dashed var(--bm);
  border-radius:var(--r4);background:transparent;font-size:11px;color:var(--t2);cursor:pointer
}
.edit-btn:hover{border-color:var(--acm);color:var(--ac)}

/* ── Rich text block ── */
.rich-be{white-space:normal}
.rich-be b,.rich-be strong{font-weight:700}
.rich-be i,.rich-be em{font-style:italic}
.rich-be u{text-decoration:underline}
.rich-be s,.rich-be del,.rich-be strike{text-decoration:line-through}

/* ── Floating format bar ── */
#fmt-bar{
  position:fixed;display:none;align-items:center;gap:1px;
  background:#1e2035;border-radius:7px;padding:3px 5px;
  box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:9000;pointer-events:auto;
  border:1px solid rgba(255,255,255,.08)
}
#fmt-bar.vis{display:flex}
.fmtb{
  width:26px;height:26px;border:none;background:transparent;color:#cdd6f4;
  cursor:pointer;border-radius:4px;font-size:12px;line-height:1;
  display:flex;align-items:center;justify-content:center;font-family:var(--fs);transition:background .1s
}
.fmtb:hover,.fmtb.on{background:rgba(255,255,255,.18)}
.fmtvsep{width:1px;height:14px;background:rgba(255,255,255,.12);margin:0 3px}
.fmt-clr{
  width:14px;height:14px;border-radius:3px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.25);display:inline-block;transition:transform .1s;flex-shrink:0
}
.fmt-clr:hover{transform:scale(1.25);border-color:#fff}
#fmt-colors{display:flex;gap:3px;align-items:center}
.fmtb-u{text-decoration:underline}
.fmt-clr-clear{background:linear-gradient(135deg,#f00 33%,#0c0 66%,#00f)}

/* ── Preview responsive full-height ── */
#pouter.pv-resp{flex-direction:column;align-items:stretch;padding:0;overflow:hidden}
#pouter.pv-resp #pfwrap{flex:1;width:100% !important;height:auto;min-height:0;transform:none !important;margin-bottom:0 !important}
#pouter.pv-resp #pframe{height:100%;min-height:0;border-radius:0;border-left:none;border-right:none;box-shadow:none}

/* ── Paragraph alignment row ── */
.align-row{display:flex;gap:2px;margin-top:5px;padding-top:4px;border-top:.5px solid var(--bl)}
.abtn{
  display:flex;align-items:center;justify-content:center;gap:2px;padding:2px 6px;
  border:1px solid var(--bm);border-radius:var(--r4);background:transparent;
  color:var(--t2);cursor:pointer;font-size:10px;line-height:1;transition:all .1s
}
.abtn svg{width:11px;height:11px;flex-shrink:0}
.abtn:hover{background:var(--acl);color:var(--ac);border-color:var(--acb)}
.abtn.on{background:var(--ac);color:#fff;border-color:var(--acd)}

/* ── Code editor tab buttons ── */
.ce-tab{padding:2px 8px;border:none;background:transparent;color:var(--t2);font-size:10px;font-family:var(--fm);cursor:pointer;border-radius:var(--r4);transition:all .1s;white-space:nowrap;line-height:1}
.ce-tab:hover{background:var(--bg2);color:var(--t0)}
.ce-tab.act{background:var(--bg2);color:var(--t0);font-weight:600}

/* ── Tree view pane ── */
#ce-tree-pane{flex:1;overflow-y:auto;background:#fff;padding:4px 3px;min-height:0}
.tv-empty{font-size:11px;color:var(--t2);text-align:center;padding:20px 10px;font-family:var(--fm)}

/* Tree block node */
.tn{position:relative;margin-bottom:1px}
.tn-hdr{display:flex;align-items:center;gap:3px;padding:2px 4px 2px 3px;border-radius:var(--r4);cursor:pointer;min-height:22px;transition:background .08s;user-select:none}
.tn-hdr:hover{background:var(--bg1)}
.tn-hdr.tn-sel{background:var(--acl)!important}
.tn-hdr.tn-sel:hover{background:var(--acb)!important}

/* Toggle arrow */
.tn-tog{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:9px;flex-shrink:0;border-radius:2px;transition:color .1s}
.tn-tog.clickable{cursor:pointer}
.tn-tog.clickable:hover{color:var(--t0);background:var(--bg2)}

/* Block type badge */
.tn-badge{font-size:9px;font-family:var(--fm);padding:1px 4px;border-radius:2px;background:var(--bg2);color:var(--t1);flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;line-height:1.4}

/* Tag label */
.tn-tag{font-family:var(--fm);font-size:10px;border-radius:3px;padding:1px 5px;flex-shrink:0;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.tt-h{background:rgba(38,68,186,.1);color:#2644ba}
.tt-p{background:rgba(80,80,80,.08);color:#555}
.tt-div{background:rgba(120,60,220,.1);color:#6b2fba}
.tt-fig{background:rgba(30,140,80,.1);color:#0e7a40}
.tt-list{background:rgba(200,100,30,.1);color:#b05a10}
.tt-hr{background:rgba(80,80,80,.08);color:#777}
.tt-def{background:rgba(60,60,60,.08);color:#555}

/* Text preview */
.tn-txt{font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--fm);min-width:0}

/* Hover action buttons */
.tn-acts{display:none;align-items:center;gap:1px;flex-shrink:0;margin-left:2px}
.tn-hdr:hover .tn-acts{display:flex}
.tn-act{width:17px;height:17px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .1s;padding:0;flex-shrink:0}
.tn-act:hover{background:var(--bg2);color:var(--t0)}
.tn-a-del:hover{background:rgba(220,50,50,.1);color:#b91c1c}
.tn-a-ins:hover{background:rgba(30,140,80,.1);color:#0e7a40}
.tn-a-edit:hover{background:var(--acl);color:var(--ac)}

/* Inner element tree (expanded block children) */
.tn-children{padding-left:13px;border-left:1px solid var(--bl);margin-left:12px}
.tn-inner-node{margin-bottom:1px}
.tn-inode-hdr{display:flex;align-items:center;gap:3px;padding:1px 3px;min-height:17px}
.tn-inode-tag{font-family:var(--fm);font-size:9px;padding:0 3px;border-radius:2px;background:var(--bg2);color:var(--t1);flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.45}
.tn-inode-txt{font-size:9px;color:var(--t2);font-family:var(--fm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;font-style:italic}

/* Inline HTML editor */
.tn-edit-wrap{padding:3px 5px 6px;background:var(--bg1);border-radius:0 0 var(--r4) var(--r4);margin-top:1px;border-top:1px solid var(--bl)}
.tn-edit-wrap textarea{width:100%;box-sizing:border-box;background:#fff;color:var(--t0);border:1px solid var(--bm);border-radius:var(--r4);padding:6px 8px;font-family:var(--fm);font-size:11px;line-height:1.55;resize:vertical;min-height:72px;max-height:220px;outline:none;tab-size:2;white-space:pre}
.tn-edit-wrap textarea:focus{border-color:var(--acm);box-shadow:0 0 0 2px rgba(38,68,186,.1)}
.tn-edit-btns{display:flex;gap:5px;margin-top:5px}
.tn-edit-save{padding:3px 11px;border:none;border-radius:var(--r4);background:var(--ac);color:#fff;font-size:11px;font-family:var(--fs);cursor:pointer;transition:background .1s}
.tn-edit-save:hover{background:var(--acd)}
.tn-edit-cancel{padding:3px 10px;border:1px solid var(--bm);border-radius:var(--r4);background:transparent;color:var(--t1);font-size:11px;font-family:var(--fs);cursor:pointer;transition:all .1s}
.tn-edit-cancel:hover{border-color:var(--acm);color:var(--t0)}
.tn-edit-info{font-size:10px;margin-top:3px;font-family:var(--fm);color:#b91c1c}

/* Insert panel */
.tn-ins-wrap{padding:3px 5px 7px;background:var(--bg1);border-radius:0 0 var(--r4) var(--r4);margin-top:1px;border-top:1px solid var(--bl)}
.tn-ins-label{font-size:9px;color:var(--t2);margin-bottom:5px;font-family:var(--fm)}
.tn-ins-btns{display:flex;flex-wrap:wrap;gap:3px}
.tn-ins-btn{padding:2px 7px;border:1px solid var(--bm);background:#fff;color:var(--t1);border-radius:3px;font-size:9px;font-family:var(--fm);cursor:pointer;transition:all .1s}
.tn-ins-btn:hover{background:var(--acl);border-color:var(--acm);color:var(--ac)}

/* Tree context menu */
#ctxm-tree{
  display:none;position:fixed;z-index:2000;background:#fff;border:1px solid var(--bm);
  border-radius:var(--r8);padding:3px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:140px
}
#ctxm-tree.open{display:block}

/* ── Shortcut Help Modal ── */
#sc-overlay{
  display:none;position:fixed;inset:0;z-index:3000;
  background:rgba(0,0,0,.38);align-items:center;justify-content:center
}
#sc-overlay.open{display:flex}
#sc-box{
  background:#fff;border-radius:var(--r12);box-shadow:0 8px 40px rgba(0,0,0,.18);
  width:560px;max-width:calc(100vw - 32px);max-height:80vh;display:flex;flex-direction:column;overflow:hidden
}
#sc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;border-bottom:1px solid var(--bl);flex-shrink:0
}
#sc-head span{font-weight:600;font-size:14px;color:var(--t0)}
#sc-head-acts{display:flex;align-items:center;gap:6px}
#sc-close{
  border:none;background:transparent;font-size:16px;color:var(--t2);cursor:pointer;
  padding:2px 6px;border-radius:var(--r4);line-height:1;transition:all .1s
}
#sc-close:hover{background:var(--bg2);color:var(--t0)}
.sc-reset-btn{
  padding:2px 8px;border:1px solid var(--bm);border-radius:var(--r4);
  background:transparent;font-size:11px;font-family:var(--fs);color:var(--t1);cursor:pointer;transition:all .1s
}
.sc-reset-btn:hover{background:var(--bg2);color:var(--t0)}
#sc-body{overflow-y:auto;padding:14px 18px 18px}
.sc-section{margin-bottom:16px}
.sc-section:last-child{margin-bottom:0}
.sc-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:7px}
.sc-table{width:100%;border-collapse:collapse}
.sc-table tr+tr td{border-top:1px solid var(--bl)}
.sc-table td{padding:5px 0;font-size:12px;vertical-align:middle}
.sc-table td:first-child{width:58%;color:var(--t1)}
.sc-table td:last-child{color:var(--t0)}
kbd{
  display:inline-block;padding:1px 6px;border:1px solid var(--bm);border-bottom-width:2px;
  border-radius:4px;background:var(--bg1);font-family:var(--fm);font-size:11px;
  color:var(--t0);line-height:1.6;white-space:nowrap
}
/* Editable key badges */
.sc-kbd-cell{display:flex;align-items:center;gap:4px}
.sc-edit-badge{
  display:inline-flex;align-items:center;gap:4px;cursor:pointer;
  padding:2px 4px;border-radius:var(--r4);transition:background .1s
}
.sc-edit-badge:hover{background:var(--acl)}
.sc-edit-tip{
  font-size:9px;color:var(--acm);opacity:0;transition:opacity .1s;
  font-family:var(--fs);white-space:nowrap
}
.sc-edit-badge:hover .sc-edit-tip{opacity:1}
.sc-edit-badge.sc-capturing .sc-edit-tip{opacity:1;color:var(--ac)}
.sc-edit-badge.sc-capturing kbd{background:var(--acl);border-color:var(--ac);color:var(--ac)}
kbd.sc-unbound{background:var(--bg2);border-color:var(--bl);color:var(--t2);font-style:italic}
.sc-unbound-lbl{font-size:11px;color:var(--t2);font-style:italic}
.sc-hint{font-size:10px;color:var(--t2);margin-top:14px;text-align:center;padding-top:10px;border-top:1px solid var(--bl)}
</style>
</head>
<body>
<div id="app">

<!-- Top Bar -->
<div id="topbar">

    </div>
    <div class="tg">
      <button class="tbtn2" data-insert="abstract"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>摘要</button>
      <button class="tbtn2" data-insert="authors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>作者</button>
      <button class="tbtn2" data-insert="keywords"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>关键词</button>
      <button class="tbtn2" data-dialog="infobox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>信息框</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-dialog="img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>图片</button>
      <button class="tbtn2" data-dialog="video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>视频</button>
    </div>
    <div class="tg">
      <button class="tbtn2" data-dialog="eq-block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3a2 2 0 0 1 2 2v.5a.5.5 0 0 0 1 0V9a2 2 0 0 1 2-2h3"/><path d="M4 17h3a2 2 0 0 0 2-2v-.5a.5.5 0 0 1 1 0v.5a2 2 0 0 0 2 2h3"/></svg>公式块</button>
      <button class="tbtn2" data-dialog="eq-inline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h3a2 2 0 0 1 2 2v.5a.5.5 0 0 0 1 0V9a2 2 0 0 1 2-2h3"/></svg>行内式</button>
      <button class="tbtn2" data-dialog="code"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>代码</button>
      <button class="tbtn2" data-dialog="table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>表格</button>

      </div>
    </div>
  </div>

  <!-- Resize handle -->
  <div id="rhandle"></div>

  <!-- Code editor -->

      <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
      <span>HTML 代码 · 实时预览</span>
      <div style="flex:1"></div>
      <button class="ce-tab act" id="ce-tab-tree" aria-label="树形视图">🌲 树形</button>

</div>

    <button class="dbtn" data-w="768px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>768</button>
    <button class="dbtn" data-w="390px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>390</button>

    <div class="dbtns">

  <div id="sc-box">
    <div id="sc-head">
      <span>⌨ 键盘快捷键</span>
      <div id="sc-head-acts">

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  onload="window._katexReady=true"></script>

<script>
"use strict";
/* =========================================================
   STATE
   ========================================================= */
var _blocks  = [];
var _sel     = null;
var _ctxId   = null;
var _dlgType = null;
var _tblH    = [];
var _tblR    = [];
var _eqMode  = 'block';
var _pvTimer = null;
var _idSeq   = 0;
var _editingBlock = null;

var _pendingScrollBid = null; // block id to scroll to in preview on next render or immediately
var _draggingId = null; // block id being dragged for reorder
var _treeMode = true; // true = tree view; false = raw HTML textarea
var _treeExpanded = {}; // bid → bool: whether that block is expanded in tree
var _syncTreeTimer = null; // debounce timer for tree rebuild
var TREE_DEPTH_MAX = 5; // max inner-element depth to render in expanded block tree

function uid() { return 'b' + (++_idSeq); }

/* Shared alignment button definitions */

function mkBlock(type, data) {
  data = data || {};
  var d = DEFS[type] || { label:type, def:'' };
  return {
    id: uid(), type: type, label: d.label,
    content: (data.content !== undefined) ? data.content : d.def,
    data: Object.assign({}, data)
  };
}

/* =========================================================
   HELPERS
   ========================================================= */
function $id(id) { return document.getElementById(id); }
function mkDiv(cls) { var d = document.createElement('div'); if(cls) d.className = cls; return d; }
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function debounce(fn, ms) {
  var t;
  return function() { var a=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,a);},ms); };
}

/* =========================================================
   BUILD EDITABLE DIV
   Key fix: use textContent (not innerHTML) to set content,
   block Enter key from creating new DOM nodes.
   ========================================================= */
function makeBE(content, placeholder) {
  var d = document.createElement('div');
  d.className = 'be';
  d.contentEditable = 'true';
  d.dataset.ph = placeholder || '';
  d.textContent = content || '';
  d.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault(); // prevent <div> insertion inside block
      // Insert a plain newline at cursor position
      document.execCommand('insertText', false, '\n');
    }
  });
  return d;
}

/* =========================================================
   BUILD RICH EDITABLE DIV (for p, blockquote, abstract, infobox)
   Uses innerHTML so inline formatting tags (<strong>, <em>, etc.)
   are preserved. Ctrl+B/I/S/U apply formatting shortcuts.
   ========================================================= */
function makeRichBE(content, placeholder) {
  var d = document.createElement('div');
  d.className = 'be rich-be';
  d.contentEditable = 'true';
  d.dataset.ph = placeholder || '';
  if (content) d.innerHTML = content;
  d.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.execCommand('insertLineBreak', false, null);
    }
    if (e.ctrlKey || e.metaKey) {
      switch (e.key.toLowerCase()) {
        case 'b': e.preventDefault(); document.execCommand('bold',         false, null); break;
        case 'i': e.preventDefault(); document.execCommand('italic',       false, null); break;
        case 's': e.preventDefault(); e.stopPropagation(); // stop browser save shortcut
                  document.execCommand('strikeThrough', false, null); break;
        case 'u': e.preventDefault(); document.execCommand('underline',    false, null); break;
      }
    }
  });
  return d;
}

/* =========================================================
   INSERT BLOCK — ONLY APPENDS, never re-renders
   ========================================================= */
function insertBlock(type, data) {
  var b = mkBlock(type, data);
  _blocks.push(b);
  _appendBlockEl(b);
  _updateCount();
  syncCode();
  schedPv();
  // scroll & select after paint
  setTimeout(function() {
    var el = $id(b.id);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'nearest'}); setSelected(b.id); }
  }, 40);
  return b;
}

/* =========================================================
   APPEND ONE BLOCK ELEMENT
   Called ONCE per block. Never touches existing elements.
   ========================================================= */
function _mkDragHandle(bid) {
  var h = document.createElement('div');
  h.className = 'bdrag'; h.draggable = true; h.title = '拖动排序'; h.textContent = '⠿';
  h.addEventListener('dragstart', function(e) {
    _draggingId = bid;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', bid);
    setTimeout(function(){ var el=$id(bid); if(el) el.style.opacity='.4'; }, 0);
  });
  h.addEventListener('dragend', function() {
    var el=$id(bid); if(el) el.style.opacity='';
    _draggingId = null;
    document.querySelectorAll('.bi.drag-over').forEach(function(n){ n.classList.remove('drag-over'); });
  });
  return h;
}

function _buildBlockEl(b) {
  var el = document.createElement('div');
  el.id = b.id;
  el.className = 'bi bi-' + b.type;

  // ── Left gutter controls ──
  var ctrl = mkDiv('bctrl');
  var btnUp = document.createElement('button'); btnUp.className='bcb'; btnUp.title='上移'; btnUp.textContent='↑';
  var btnDn = document.createElement('button'); btnDn.className='bcb'; btnDn.title='下移'; btnDn.textContent='↓';
  btnUp.addEventListener('click', function(e){ e.stopPropagation(); moveBlock(b.id,-1); });
  btnDn.addEventListener('click', function(e){ e.stopPropagation(); moveBlock(b.id, 1); });
  ctrl.appendChild(btnUp); ctrl.appendChild(_mkDragHandle(b.id)); ctrl.appendChild(btnDn);
  el.appendChild(ctrl);

  // ── Badge ──
  var badge = document.createElement('span');
  badge.className = 'btbadge'; badge.textContent = b.label;
  el.appendChild(badge);

  // ── Inner content ──
  var inner = mkDiv('binn');
  _buildInner(inner, b);
  el.appendChild(inner);

  // ── Events ──
  el.addEventListener('click', function(){ setSelected(b.id); });
  el.addEventListener('contextmenu', function(e){ e.preventDefault(); _openCtx(e, b.id); });
  el.addEventListener('dragover', function(e) {
    if (!_draggingId || _draggingId === b.id) return;
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    el.classList.add('drag-over');
  });
  el.addEventListener('dragleave', function(e) {
    if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
  });
  el.addEventListener('drop', function(e) {
    e.preventDefault(); el.classList.remove('drag-over');
    if (_draggingId && _draggingId !== b.id) reorderBlock(_draggingId, b.id);
  });

  return el;
}

function _appendBlockEl(b) {
  // Remove empty hint if present
  var hint = $id('ehint');
  if (hint && hint.parentNode) hint.parentNode.removeChild(hint);

  $id('blist').appendChild(_buildBlockEl(b));
}

/* =========================================================
   BUILD INNER — populates .binn for a block
   For text-editable blocks: create one .be, attach ONE input listener.
   For media/eq/table blocks: show info + edit button.
   ========================================================= */
function _buildInner(inner, b) {
  inner.innerHTML = '';

  function addEditBtn(label, fn) {
    var btn = document.createElement('button');
    btn.className = 'edit-btn'; btn.textContent = '✏ ' + label;
    btn.addEventListener('click', function(e){ e.stopPropagation(); fn(b); });
    inner.appendChild(btn);
  }

  function addBE(content, placeholder, onChange) {
    var d = makeBE(content, placeholder);
    inner.appendChild(d);
    d.addEventListener('input', function() { onChange(d.innerText); syncCode(); schedPv(); });
    return d;
  }

  function addRichBE(content, placeholder, onChange) {
    var d = makeRichBE(content, placeholder);
    inner.appendChild(d);
    d.addEventListener('input', function() { onChange(d.innerHTML); syncCode(); schedPv(); });
    return d;
  }

  function addAlignRow(b) {
    var row = mkDiv('align-row');
    ALIGN_DEFS.forEach(function(a) {
      var btn = document.createElement('button');
      btn.className = 'abtn' + (b.data.align === a.v ? ' on' : '');
      btn.innerHTML = a.svg + a.label;
      btn.title = a.label;
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        b.data.align = (b.data.align === a.v) ? '' : a.v;
        row.querySelectorAll('.abtn').forEach(function(ab){ ab.classList.remove('on'); });
        if (b.data.align) btn.classList.add('on');
        syncCode(); schedPv();
      });
      row.appendChild(btn);
    });
    inner.appendChild(row);
  }

  switch (b.type) {
    case 'h1': case 'h2': case 'h3': case 'h4': case 'h5':
      addBE(b.content, '输入标题…', function(v){ b.content=v; });
      break;

    case 'p': {
      addRichBE(b.content, '输入段落文字…', function(v){ b.content=v; });
      addAlignRow(b);
      break;
    }

    case 'blockquote': {
      var wrap = mkDiv('bqx'); inner.appendChild(wrap);
      var d = makeRichBE(b.content, '引用文字…');
      wrap.appendChild(d);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      break;
    }
    case 'ul': case 'ol': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent = b.type==='ul' ? '无序列表（每行一项）' : '有序列表（每行一项）';
      inner.appendChild(lbl);
      addBE(b.content, '列表项…', function(v){ b.content=v; });
      break;
    }
    case 'abstract': {
      var wrap = mkDiv('abx'); inner.appendChild(wrap);
      var tit = mkDiv('abxtit'); tit.textContent='Abstract / 摘要'; wrap.appendChild(tit);
      var d = makeRichBE(b.content, '摘要内容…');
      wrap.appendChild(d);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      addAlignRow(b);
      break;
    }
    case 'authors': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent='作者 · 机构（换行分隔）'; inner.appendChild(lbl);
      addBE(b.content, '作者信息…', function(v){ b.content=v; });
      break;
    }
    case 'keywords': {
      var lbl = mkDiv(); lbl.style.cssText='font-size:10px;color:var(--t2);margin-bottom:4px';
      lbl.textContent='关键词（逗号分隔）'; inner.appendChild(lbl);
      addBE(b.content, '关键词A, 关键词B…', function(v){ b.content=v; });
      break;
    }
    case 'infobox': {
      var colors = {
        info:  {bg:'var(--acl)', bd:'var(--acb)', tc:'var(--acd)'},
        ok:    {bg:'#EAF3DE',   bd:'#C0DD97',    tc:'#27500A'},
        warn:  {bg:'#FAEEDA',   bd:'#FAC775',    tc:'#633806'},
        error: {bg:'#FCEBEB',   bd:'#F7C1C1',    tc:'#791F1F'},
        note:  {bg:'var(--bg1)',bd:'var(--bm)',   tc:'var(--t0)'},
      };
      var c = colors[b.data.ibType||'info'] || colors.info;
      var wrap = mkDiv('ibx');
      wrap.style.background=c.bg; wrap.style.border='.5px solid '+c.bd;
      var tit = mkDiv('ibxtit'); tit.style.color=c.tc;
      tit.textContent = b.data.ibTitle || '提示'; wrap.appendChild(tit);
      var d = makeRichBE(b.content, '内容…'); d.style.color=c.tc; wrap.appendChild(d);
      inner.appendChild(wrap);
      d.addEventListener('input', function(){ b.content=d.innerHTML; syncCode(); schedPv(); });
      addEditBtn('修改信息框', openInfoboxDialog);
      break;
    }
    case 'eq': {
      var wrap = mkDiv('eqx'); inner.appendChild(wrap);
      var lbl = document.createElement('span'); lbl.className='eqlbl';
      lbl.textContent = '公式块'+(b.data.label?' · '+b.data.label:''); wrap.appendChild(lbl);

      lbl.textContent='行内公式'; inner.appendChild(lbl);

      addEditBtn('编辑', function(bl){ openEqDialog('inline', bl); });

      addEditBtn('编辑图片', openImgDialog);
      break;
    }
    case 'video': {
      var wrap = mkDiv('vidx'); inner.appendChild(wrap);
      var ph = mkDiv('vidph');
      ph.innerHTML='<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>';
      var nm = document.createElement('span');
      nm.textContent = b.data.src ? b.data.src.substring(0,44) : '未设置视频 URL';
      ph.appendChild(nm); wrap.appendChild(ph);
      var cap = mkDiv('vidcap'); cap.textContent = b.data.caption||'视频标题'; wrap.appendChild(cap);
      addEditBtn('编辑视频', openVideoDialog);
      break;

    case 'table': {
      var lbl = mkDiv('tblcap');
      var h = b.data.headers || []; var r = b.data.rows || [];
      lbl.textContent = (b.data.caption||'表格') + (h.length ? ' · '+h.length+'列 × '+r.length+'行' : '');
      inner.appendChild(lbl);
      if (h.length) {
        var tblx = mkDiv('tblx'); inner.appendChild(tblx);

        thead.appendChild(hr); tbl.appendChild(thead);
        var tbody = document.createElement('tbody');
        r.forEach(function(row){
          var tr=document.createElement('tr');
          h.forEach(function(_,ci){ var td=document.createElement('td'); td.textContent=row[ci]||''; tr.appendChild(td); });
          tbody.appendChild(tr);

    }

/* refresh inner of an existing block element */
function _refreshInner(b) {
  var el = $id(b.id);
  if (!el) return;
  var inner = el.querySelector('.binn');
  if (inner) _buildInner(inner, b);
}

/* =========================================================
   SELECTION
   ========================================================= */
function setSelected(id) {
  if (_sel) { var p=$id(_sel); if(p) p.classList.remove('sel'); }
  _sel = id;
  if (id) { var el=$id(id); if(el) el.classList.add('sel'); }
  if (id) { _pendingScrollBid = id; scrollPreviewToBlock(id); scrollEditorToBlock(id); _scrollCodeToBlock(id); }
  // Sync tree selection highlight
  document.querySelectorAll('#ce-tree-pane .tn-hdr.tn-sel').forEach(function(h){ h.classList.remove('tn-sel'); });
  if (id) {
    var tnEl = $id('tn-' + id);
    if (tnEl) { var tnHdr = tnEl.querySelector('.tn-hdr'); if (tnHdr) tnHdr.classList.add('tn-sel'); }
  }
}

/* =========================================================
   MOVE / DELETE / DUPLICATE
   ========================================================= */
function moveBlock(id, dir) {
  var i = _blocks.findIndex(function(b){ return b.id===id; });
  if (i<0) return;
  var ni = i+dir;
  if (ni<0 || ni>=_blocks.length) return;
  var tmp=_blocks[i]; _blocks[i]=_blocks[ni]; _blocks[ni]=tmp;
  // Re-order DOM nodes without re-rendering
  var bl = $id('blist');
  var els = Array.from(bl.querySelectorAll('.bi'));
  if (dir===-1) bl.insertBefore(els[i], els[ni]);
  else          bl.insertBefore(els[ni], els[i]);
  syncCode(); schedPv();
}

function reorderBlock(fromId, toId) {
  var fi = _blocks.findIndex(function(b){ return b.id===fromId; });
  if (fi<0) return;
  var moved = _blocks.splice(fi, 1)[0];
  var ti = _blocks.findIndex(function(b){ return b.id===toId; });
  if (ti<0) { _blocks.splice(fi, 0, moved); return; } // rollback if target gone
  _blocks.splice(ti, 0, moved);
  var bl = $id('blist');
  var fromEl = $id(fromId), toEl = $id(toId);
  if (fromEl && toEl) bl.insertBefore(fromEl, toEl);
  syncCode(); schedPv();
}

function deleteBlock(id) {
  var el=$id(id); if(el) el.remove();
  _blocks = _blocks.filter(function(b){ return b.id!==id; });
  if (_sel===id) _sel=null;
  _updateCount(); syncCode(); schedPv();
}

function duplicateBlock(id) {
  var src=_blocks.find(function(b){ return b.id===id; }); if(!src) return;
  var copy = JSON.parse(JSON.stringify(src)); copy.id=uid();
  var i=_blocks.findIndex(function(b){ return b.id===id; });
  _blocks.splice(i+1,0,copy);
  var origEl=$id(id);
  var newEl = _buildBlockEl(copy);
  if(origEl&&origEl.nextSibling) origEl.parentNode.insertBefore(newEl,origEl.nextSibling);
  else $id('blist').appendChild(newEl);
  _updateCount(); syncCode(); schedPv();
}

function _updateCount() {
  $id('bcount').textContent = _blocks.length + ' 个块';
  if (_blocks.length===0) {
    var bl=$id('blist'); bl.innerHTML='';
    var h=document.createElement('div'); h.id='ehint';
    h.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:28px;height:28px;opacity:.35"><path d="M12 5v14M5 12h14"/></svg><div>使用上方工具栏插入组件块</div><div style="font-size:10px;opacity:.6">每个组件独立生成代码片段</div>';
    bl.appendChild(h);
  }
}

/* =========================================================
   CODE SYNC  blocks → textarea
   ========================================================= */
function syncCode() {
  if (_syncingFromCode) return; // code is driving; don't overwrite textarea
  var body = _blocks.map(b2html).join('\n\n');
  var full = wrapHTML(body);
  $id('ctarea').value = full;
  $id('cchars').textContent = full.length + ' chars';
  syncTree();
}

function b2html(b) {
  var bid = ' data-bid="'+b.id+'"';
  switch(b.type) {
    case 'h1': case 'h2': case 'h3': case 'h4': case 'h5':
      return '  <'+b.type+bid+'>'+b.content+'</'+b.type+'>';
    case 'p':
    case 'p': {
      var pstyle = b.data.align ? ' style="text-align:'+b.data.align+'"' : '';
      return '  <p'+bid+pstyle+'>'+b.content+'</p>';
    }
    case 'blockquote':
      return '  <blockquote'+bid+'>\n    <p>'+b.content+'</p>\n  </blockquote>';
    case 'ul': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return '    <li>'+s.trim()+'</li>';}).join('\n');
      return '  <ul'+bid+'>\n'+items+'\n  </ul>';
    }
    case 'ol': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return '    <li>'+s.trim()+'</li>';}).join('\n');
      return '  <ol'+bid+'>\n'+items+'\n  </ol>';
    }
    case 'abstract': {
      var absstyle = b.data.align ? ' style="text-align:'+b.data.align+'"' : '';
      return '  <div class="abstract-box"'+bid+'>\n    <div class="abs-title">摘要</div>\n    <p'+absstyle+'>'+b.content+'</p>\n  </div>';
    }
    case 'authors': {
      var lines=b.content.split('\n');
      var a=lines[0]||''; var f=lines[1]||'';
      return '  <p class="paper-authors"'+bid+'>'+a+'</p>'+(f?'\n  <p class="paper-affil">'+f+'</p>':'');
    }
    case 'keywords': {
      var kws=b.content.split(',').map(function(k){return k.trim();}).filter(Boolean);
      return '  <div class="kw-row"'+bid+'>\n'+kws.map(function(k){return '    <span class="kw">'+k+'</span>';}).join('\n')+'\n  </div>';
    }
    case 'infobox': {
      var m={info:'b-info',ok:'b-ok',warn:'b-warn',error:'b-err',note:'b-note'};
      var cls=m[b.data.ibType||'info']||'b-info';
      return '  <div class="ib '+cls+'"'+bid+'>\n    <div class="bt">'+(b.data.ibTitle||'提示')+'</div>\n    <p>'+b.content+'</p>\n  </div>';
    }
    case 'eq': {
      var lbl=b.data.label?' data-eqlabel="'+b.data.label+'"':'';
      return '  <div class="eq"'+bid+lbl+'>\n    $$'+(b.data.raw||'')+'$$\n  </div>';
    }
    case 'eq-inline':
      return '  <p'+bid+'>$'+(b.data.raw||'')+'$</p>';
    case 'img': {
      var d=b.data; var src=d.src||''; var alt=d.alt||''; var cap=d.caption||''; var fn=d.fignum||'';
      return '  <figure class="af"'+bid+'>\n    <div class="iw">\n      <div class="img-body">\n        <img src="'+src+'" alt="'+alt+'" loading="lazy">\n      </div>\n      <figcaption>'+(fn?'<span>'+fn+'</span>：':'')+cap+'</figcaption>\n    </div>\n  </figure>';
    }
    case 'video': {
      var d=b.data; var src=d.src||''; var cap=d.caption||''; var fn=d.fignum||'';
      var media=d.vtype==='iframe'
        ?'      <iframe src="'+src+'" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"></iframe>'
        :'      <video controls>\n        <source src="'+src+'" type="video/mp4">\n        您的浏览器不支持 video 标签。\n      </video>';
      return '  <figure class="vw"'+bid+'>\n    <div class="vbox">\n'+media+'\n    </div>\n    <figcaption>'+(fn?'<span>'+fn+'</span>：':'')+cap+'</figcaption>\n  </figure>';
    }
    case 'table': {
      var d=b.data; var h=d.headers||[]; var r=d.rows||[]; var cap=d.caption||''; var tn=d.tablenum||'';
      var s='  <div class="tw"'+bid+'>\n';
      if(cap) s+='    <p class="tc">'+(tn?'<span>'+tn+'</span>：':'')+cap+'</p>\n';
      s+='    <div class="t-scroll">\n    <table class="at">\n      <thead>\n        <tr>'+h.map(function(hh){return'<th>'+hh+'</th>';}).join('')+'</tr>\n      </thead>\n      <tbody>\n';
      r.forEach(function(row){ s+='        <tr>'+h.map(function(_,i){return'<td>'+(row[i]||'')+'</td>';}).join('')+'</tr>\n'; });
      s+='      </tbody>\n    </table>\n    </div>\n  </div>';
      return s;
    }
    case 'codeblock':
      return '  <div class="cbw"'+bid+'>\n    <div class="ch"><span class="cl">'+(b.data.lang||'code')+'</span></div>\n    <pre><code>'+b.content+'</code></pre>\n  </div>';
    case 'refs': {
      var items=b.content.split('\n').filter(function(s){return s.trim();}).map(function(s){return'      <li>'+s.trim()+'</li>';}).join('\n');
      return '  <div class="refs"'+bid+'>\n    <h2>参考文献</h2>\n    <ol>\n'+items+'\n    </ol>\n  </div>';
    }
    case 'divider':
      return '  <hr'+bid+' style="border:none;border-top:0.5px solid var(--color-border-tertiary);margin:2rem 0;">';
    case 'raw': {
      var rh = (b.data.html || '<div></div>').trim();
      // inject data-bid into the first opening tag
      return '  ' + rh.replace(/(<[a-zA-Z][a-zA-Z0-9]*)(\s|\/?>)/, '$1 data-bid="'+b.id+'"$2');
    }
    default:
      return '  <!-- '+b.type+' -->';
  }
}

/* =========================================================
   CODE → BLOCKS SYNC  (parse textarea HTML → rebuild _blocks + DOM)
   ========================================================= */
function parseHtmlToBlocks(htmlStr) {
  if (!htmlStr || !htmlStr.trim()) return [];
  var doc;
  try { doc = new DOMParser().parseFromString(htmlStr, 'text/html'); } catch(e) { console.error('HTML parse error:', e); return null; }
  var ar = doc.querySelector('.ar');
  if (!ar) return null;
  var children = Array.prototype.slice.call(ar.children);
  var blocks = [];
  var i = 0;
  // Helper: extract numbered caption from a figcaption/tc element
  function capInfo(container) {
    if (!container) return { cap: '', num: '' };
    var sp = container.querySelector('span');
    if (sp) return { cap: container.textContent.replace(sp.textContent, '').replace(/^[：:]\s*/, '').trim(), num: sp.textContent.trim() };
    return { cap: container.textContent.trim(), num: '' };
  }
  while (i < children.length) {
    var el = children[i];
    var tag = el.tagName.toLowerCase();

    // Divider
    if (tag === 'hr') {
      blocks.push(mkBlock('divider', {}));
      i++; continue;
    }

    // Headings h1-h5
    if (/^h[1-5]$/.test(tag)) {
      blocks.push(mkBlock(tag, { content: el.textContent }));
      i++; continue;
    }

    // Paragraph – several subtypes
    if (tag === 'p') {
      if (el.classList.contains('paper-authors')) {
        var authContent = el.textContent;
        if (i + 1 < children.length && children[i + 1].classList.contains('paper-affil')) {
          authContent += '\n' + children[i + 1].textContent;
          i++;
        }
        blocks.push(mkBlock('authors', { content: authContent }));
        i++; continue;
      }
      if (el.classList.contains('paper-affil')) { i++; continue; } // consumed above
      // Inline equation: entire text is $raw$
      var txt = el.textContent.trim();
      if (txt.length > 2 && txt[0] === '$' && txt[txt.length - 1] === '$' && txt.indexOf('\n') === -1) {
        blocks.push(mkBlock('eq-inline', { raw: txt.slice(1, -1) }));
        i++; continue;
      }
      blocks.push(mkBlock('p', { content: el.innerHTML, align: el.style.textAlign || '' }));
      i++; continue;
    }

    // Blockquote
    if (tag === 'blockquote') {
      var bqp = el.querySelector('p');
      blocks.push(mkBlock('blockquote', { content: bqp ? bqp.innerHTML : el.innerHTML }));
      i++; continue;
    }

    // Lists
    if (tag === 'ul') {
      var uls = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
      blocks.push(mkBlock('ul', { content: uls.join('\n') }));
      i++; continue;
    }
    if (tag === 'ol') {
      var ols = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
      blocks.push(mkBlock('ol', { content: ols.join('\n') }));
      i++; continue;
    }

    // Figures – image or video
    if (tag === 'figure') {
      if (el.classList.contains('af')) {
        var img = el.querySelector('img');
        var figcap = el.querySelector('figcaption');
        var fc = capInfo(figcap);
        blocks.push(mkBlock('img', { src: img ? (img.getAttribute('src') || '') : '', alt: img ? (img.getAttribute('alt') || '') : '', caption: fc.cap, fignum: fc.num }));
        i++; continue;
      }
      if (el.classList.contains('vw')) {
        var vif = el.querySelector('iframe');
        var vsrc = el.querySelector('video source');
        var vfc = capInfo(el.querySelector('figcaption'));
        blocks.push(mkBlock('video', { vtype: vif ? 'iframe' : 'file', src: vif ? (vif.getAttribute('src') || '') : (vsrc ? (vsrc.getAttribute('src') || '') : ''), caption: vfc.cap, fignum: vfc.num }));
        i++; continue;
      }
      i++; continue;
    }

    // Divs with class-based type detection
    if (tag === 'div') {
      if (el.classList.contains('abstract-box')) {
        var absp = el.querySelector('p');
        blocks.push(mkBlock('abstract', { content: absp ? absp.innerHTML : '', align: (absp && absp.style.textAlign) || '' }));
        i++; continue;
      }
      if (el.classList.contains('kw-row')) {
        var kws = Array.prototype.slice.call(el.querySelectorAll('.kw')).map(function(s){ return s.textContent.trim(); });
        blocks.push(mkBlock('keywords', { content: kws.join(', ') }));
        i++; continue;
      }
      if (el.classList.contains('ib')) {
        var typeMap = { 'b-info': 'info', 'b-ok': 'ok', 'b-warn': 'warn', 'b-err': 'error', 'b-note': 'note' };
        var ibType = 'info';
        Object.keys(typeMap).forEach(function(cls) { if (el.classList.contains(cls)) ibType = typeMap[cls]; });
        var ibt = el.querySelector('.bt');
        var ibp = el.querySelector('p');
        blocks.push(mkBlock('infobox', { ibType: ibType, ibTitle: ibt ? ibt.textContent.trim() : '提示', content: ibp ? ibp.innerHTML : '' }));
        i++; continue;
      }
      if (el.classList.contains('eq')) {
        var eqRaw = el.textContent.trim().replace(/^\$\$/, '').replace(/\$\$$/, '').trim();
        var eqLabel = el.getAttribute('data-eqlabel') || '';
        blocks.push(mkBlock('eq', { raw: eqRaw, label: eqLabel }));
        i++; continue;
      }
      if (el.classList.contains('tw')) {
        var tbl = el.querySelector('table');
        var headers = [], rows = [];
        var tci = capInfo(el.querySelector('.tc'));
        if (tbl) {
          headers = Array.prototype.slice.call(tbl.querySelectorAll('thead th')).map(function(th){ return th.textContent.trim(); });
          rows = Array.prototype.slice.call(tbl.querySelectorAll('tbody tr')).map(function(tr){
            return Array.prototype.slice.call(tr.querySelectorAll('td')).map(function(td){ return td.textContent.trim(); });
          });
        }
        blocks.push(mkBlock('table', { headers: headers, rows: rows, caption: tci.cap, tablenum: tci.num }));
        i++; continue;
      }
      if (el.classList.contains('cbw')) {
        var cbcl = el.querySelector('.cl');
        var cbcode = el.querySelector('pre code');
        blocks.push(mkBlock('codeblock', { lang: cbcl ? cbcl.textContent.trim() : 'code', content: cbcode ? cbcode.textContent : '' }));
        i++; continue;
      }
      if (el.classList.contains('refs')) {
        var refItems = Array.prototype.slice.call(el.querySelectorAll('li')).map(function(li){ return li.textContent.trim(); });
        blocks.push(mkBlock('refs', { content: refItems.join('\n') }));
        i++; continue;
      }
    }

    // Fallback: unrecognized element → raw block (preserves custom HTML)
    var rawHtml = el.outerHTML.replace(/\s*data-bid="[^"]*"/g, '').trim();
    blocks.push(mkBlock('raw', { html: rawHtml }));
    i++;
  }
  return blocks;
}

var _codeParseTimer = null;
function schedApplyCode() {
  clearTimeout(_codeParseTimer);
  _codeParseTimer = setTimeout(applyCodeToBlocks, 600);
}
function applyCodeToBlocks() {
  var newBlocks = parseHtmlToBlocks($id('ctarea').value);
  if (!newBlocks) return; // couldn't parse (no .ar wrapper) – leave blocks as-is
  _syncingFromCode = true;
  _blocks = newBlocks;
  _sel = null;
  var bl = $id('blist');
  bl.innerHTML = '';
  _blocks.forEach(function(b) { _appendBlockEl(b); });
  _updateCount();
  _syncingFromCode = false;
  syncTree();
}

/* =========================================================
   PREVIEW
   ========================================================= */
function schedPv() { clearTimeout(_pvTimer); _pvTimer=setTimeout(doPv, 380); }
function doPv() {
  var html=$id('ctarea').value;
  var frame=$id('pframe');
  var pendingBid = _pendingScrollBid;
  _pendingScrollBid = null;
  var scrollX=0, scrollY=0;
  if (!pendingBid) {
    try { scrollX=frame.contentWindow.scrollX||0; scrollY=frame.contentWindow.scrollY||0; } catch(e){}
  }
  var doc=frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document);
  if (doc) {
    doc.open(); doc.write(html); doc.close();
    if (pendingBid) {
      setTimeout(function(){ scrollPreviewToBlock(pendingBid); }, 50);
    } else if (scrollX||scrollY) {
      try { frame.contentWindow.scrollTo(scrollX,scrollY); } catch(e){}
    }
  } else {
    var blob=new Blob([html],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    frame.src=url;
    setTimeout(function(){URL.revokeObjectURL(url);},8000);
  }
}
$id('ctarea').addEventListener('input', function(){
  $id('cchars').textContent=this.value.length+' chars';
  schedPv();
  schedApplyCode(); // sync code edits back to UI block editor
});

function scrollPreviewToBlock(bid) {
  if (!bid) return;
  var frame = $id('pframe');
  try {
    var doc = frame.contentDocument || frame.contentWindow.document;
    if (!doc || !doc.body) return;
    var el = doc.querySelector('[data-bid="' + bid + '"]');
    if (!el) return;
    var fh = frame.contentWindow.innerHeight || frame.clientHeight;
    var top = 0, node = el;
    while (node && node !== doc.body) { top += node.offsetTop || 0; node = node.offsetParent; }
    var dest = top - fh / 2 + el.offsetHeight / 2;
    frame.contentWindow.scrollTo({ top: Math.max(0, dest), behavior: 'smooth' });
    if (!doc.getElementById('_pv_hl_style')) {
      var s = doc.createElement('style');
      s.id = '_pv_hl_style';
      s.textContent = '@keyframes _pv_hl{0%,60%{outline:3px solid rgba(38,68,186,.85);background-color:rgba(38,68,186,.1)}100%{outline:3px solid rgba(38,68,186,0);background-color:rgba(38,68,186,0)}}._pv_hl{animation:_pv_hl 1.3s ease-out forwards!important;outline-offset:2px!important;}';
      (doc.head || doc.body).appendChild(s);
    }
    var prev = doc.querySelector('._pv_hl');
    if (prev) { prev.classList.remove('_pv_hl'); void prev.offsetWidth; } // force reflow to reset animation
    void el.offsetWidth; // force reflow so animation restarts if same element re-selected
    el.classList.add('_pv_hl');
  } catch(e) {}
}

function scrollEditorToBlock(id) {
  var el = $id(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function _scrollCodeToBlock(id) {
  if (!id) return;
  if (_treeMode) {
    // In tree mode: scroll the corresponding tree node into view
    var tnEl = $id('tn-' + id);
    if (tnEl) tnEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  var ta = $id('ctarea');
  if (document.activeElement === ta) return; // user is typing in code pane; don't jump
  var val = ta.value;
  var idx = val.indexOf('data-bid="' + id + '"');
  if (idx < 0) return;
  var linesBefore = val.substring(0, idx).split('\n').length - 1;
  var lineHeight = 12 * 1.65; // #ctarea font-size:12px * line-height:1.65
  ta.scrollTop = Math.max(0, linesBefore * lineHeight - ta.clientHeight / 3);
}

/* Switch between tree view and raw HTML textarea */
function switchCeTab(mode) {
  _treeMode = (mode === 'tree');
  $id('ce-tree-pane').style.display = _treeMode ? '' : 'none';
  $id('ctarea').style.display = _treeMode ? 'none' : '';
  $id('ce-tab-tree').classList.toggle('act', _treeMode);
  $id('ce-tab-html').classList.toggle('act', !_treeMode);
  if (_treeMode) _doSyncTree();
}

/* Debounced tree rebuild — called from syncCode() */
function syncTree() {
  if (!_treeMode) return;
  clearTimeout(_syncTreeTimer);
  _syncTreeTimer = setTimeout(_doSyncTree, 80);
}

/* Rebuild the tree pane from _blocks */
function _doSyncTree() {
  if (!_treeMode) return;
  var pane = $id('ce-tree-pane');
  if (!pane) return;
  pane.innerHTML = '';
  if (!_blocks.length) {
    var emp = document.createElement('div');
    emp.className = 'tv-empty';
    emp.textContent = '暂无内容';
    pane.appendChild(emp);
    return;
  }
  _blocks.forEach(function(b) { pane.appendChild(_buildTreeNode(b)); });
}

/* Determine CSS color class for an HTML tag name */
function _tagCls(tagName) {
  var t = (tagName || '').toLowerCase();
  if (/^h[1-6]$/.test(t)) return 'tt-h';
  if (t === 'p' || t === 'blockquote') return 'tt-p';
  if (t === 'div') return 'tt-div';
  if (t === 'figure') return 'tt-fig';
  if (t === 'ul' || t === 'ol') return 'tt-list';
  if (t === 'hr') return 'tt-hr';
  return 'tt-def';
}

/* Format a display label like "<div.abstract-box>" */
function _tagLabel(el) {
  var tag = el.tagName.toLowerCase();
  var s = '<' + tag;
  var cls = el.getAttribute('class');
  if (cls) {
    var parts = cls.split(/\s+/).filter(Boolean);
    // Show at most 2 classes to keep the label compact
    s += '.' + parts.slice(0, 2).join('.');
    if (parts.length > 2) s += '…';
  }
  s += '>';
  return s;
}

/* Whether a block type has inner child structure worth showing */
function _blockHasChildren(type) {
  return ['abstract','infobox','img','video','table','codeblock','refs',
          'ul','ol','blockquote','keywords','raw'].indexOf(type) >= 0;
}

/* Derive the root tag label from block type without parsing HTML */
function _blockTagDisplay(b) {
  switch (b.type) {
    case 'h1': return { tag:'h1', cls:'', color:'tt-h' };
    case 'h2': return { tag:'h2', cls:'', color:'tt-h' };
    case 'h3': return { tag:'h3', cls:'', color:'tt-h' };
    case 'h4': return { tag:'h4', cls:'', color:'tt-h' };
    case 'h5': return { tag:'h5', cls:'', color:'tt-h' };
    case 'p':  return { tag:'p',  cls:'', color:'tt-p' };
    case 'blockquote': return { tag:'blockquote', cls:'', color:'tt-p' };
    case 'ul': return { tag:'ul', cls:'', color:'tt-list' };
    case 'ol': return { tag:'ol', cls:'', color:'tt-list' };
    case 'abstract':  return { tag:'div', cls:'abstract-box', color:'tt-div' };
    case 'authors':   return { tag:'p',   cls:'paper-authors', color:'tt-p' };
    case 'keywords':  return { tag:'div', cls:'kw-row', color:'tt-div' };
    case 'infobox':   return { tag:'div', cls:'ib', color:'tt-div' };
    case 'eq':        return { tag:'div', cls:'eq', color:'tt-div' };
    case 'eq-inline': return { tag:'p',   cls:'', color:'tt-p' };
    case 'img':       return { tag:'figure', cls:'af', color:'tt-fig' };
    case 'video':     return { tag:'figure', cls:'vw', color:'tt-fig' };
    case 'table':     return { tag:'div', cls:'tw', color:'tt-div' };
    case 'codeblock': return { tag:'div', cls:'cbw', color:'tt-div' };
    case 'refs':      return { tag:'div', cls:'refs', color:'tt-div' };
    case 'divider':   return { tag:'hr',  cls:'', color:'tt-hr' };
    case 'raw':       return { tag:'?',   cls:'自定义', color:'tt-def' };
    default:          return { tag:'div', cls:'', color:'tt-def' };
  }
}

/* Build one top-level tree node for a block */
function _buildTreeNode(b) {
  var wrap = document.createElement('div');
  wrap.className = 'tn';
  wrap.id = 'tn-' + b.id;

  var expanded = !!_treeExpanded[b.id];
  var td = _blockTagDisplay(b);
  var hasChildren = _blockHasChildren(b.type);

  /* — Header row — */
  var hdr = document.createElement('div');
  hdr.className = 'tn-hdr' + (_sel === b.id ? ' tn-sel' : '');

  /* Toggle arrow */
  var tog = document.createElement('span');
  tog.className = 'tn-tog' + (hasChildren ? ' clickable' : '');
  tog.textContent = hasChildren ? (expanded ? '▼' : '▶') : '·';
  if (hasChildren) {
    (function(bid) {
      tog.addEventListener('click', function(e) {
        e.stopPropagation();
        _treeExpanded[bid] = !_treeExpanded[bid];
        var b2 = _blocks.find(function(x){ return x.id === bid; });
        if (b2) {
          var tnEl = $id('tn-' + bid);
          if (tnEl) tnEl.parentNode.replaceChild(_buildTreeNode(b2), tnEl);
        }
      });

  }
  hdr.appendChild(tog);

  /* Block type badge */

  /* Content preview */
  var preview = (b.content || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
  if (!preview && b.type === 'raw') preview = (b.data.html || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
  if (preview.length > 50) preview = preview.substring(0, 50) + '…';
  if (preview) {
    var txtSpan = document.createElement('span');
    txtSpan.className = 'tn-txt';
    txtSpan.textContent = preview;

  (function(bid, nodeWrap) {
    editBtn.addEventListener('click', function(e) { e.stopPropagation(); _toggleTreeEdit(bid, nodeWrap); });
  })(b.id, wrap);

  (function(bid, nodeWrap) {
    insBtn.addEventListener('click', function(e) { e.stopPropagation(); _toggleTreeInsert(bid, nodeWrap); });
  })(b.id, wrap);
  acts.appendChild(insBtn);

  /* Delete button */
  var delBtn = document.createElement('button');
  delBtn.className = 'tn-act tn-a-del';
  delBtn.title = '删除';
  delBtn.innerHTML = '<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" width="9" height="9"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>';
  (function(bid) {
    delBtn.addEventListener('click', function(e) { e.stopPropagation(); if (confirm('确定删除此块？')) deleteBlock(bid); });
  })(b.id);
  acts.appendChild(delBtn);

  hdr.appendChild(acts);

  /* Click header → select block */
  (function(bid, h, nodeWrap) {
    h.addEventListener('click', function() { setSelected(bid); });
    h.addEventListener('dblclick', function(e) { e.stopPropagation(); _toggleTreeEdit(bid, nodeWrap); });
    h.addEventListener('contextmenu', function(e) { e.preventDefault(); _openTreeCtx(e, bid, nodeWrap); });
  })(b.id, hdr, wrap);

  wrap.appendChild(hdr);

  /* Expanded inner HTML structure */
  if (hasChildren && expanded) {
    var rootEl = null;
    try {
      var blockHtml = b2html(b);
      var tmpDoc = new DOMParser().parseFromString('<x>' + blockHtml.trim() + '</x>', 'text/html');
      rootEl = tmpDoc.querySelector('x > *') || null;
    } catch(e) {}
    if (rootEl) {
      var childWrap = document.createElement('div');
      childWrap.className = 'tn-children';
      _renderInnerChildren(rootEl, childWrap, 0);
      wrap.appendChild(childWrap);
    }
  }

  return wrap;
}

/* Recursively render child DOM nodes as inner tree rows */
function _renderInnerChildren(el, container, depth) {
  if (depth > TREE_DEPTH_MAX) return;
  Array.prototype.slice.call(el.childNodes).forEach(function(node) {
    if (node.nodeType === 3) { // text node
      var t = (node.textContent || '').replace(/\s+/g, ' ').trim();
      if (!t) return;
      var row = document.createElement('div');
      row.className = 'tn-inner-node';
      var rh = document.createElement('div');
      rh.className = 'tn-inode-hdr';
      var dot = document.createElement('span'); dot.className = 'tn-tog'; dot.textContent = '·';
      rh.appendChild(dot);
      var ts = document.createElement('span'); ts.className = 'tn-inode-txt';
      ts.textContent = '"' + (t.length > 60 ? t.substring(0, 60) + '…' : t) + '"';
      rh.appendChild(ts);
      row.appendChild(rh);
      container.appendChild(row);
    } else if (node.nodeType === 1) { // element node
      var row = document.createElement('div');
      row.className = 'tn-inner-node';
      var rh = document.createElement('div');
      rh.className = 'tn-inode-hdr';
      var arrow = document.createElement('span'); arrow.className = 'tn-tog';
      arrow.textContent = node.children.length ? '▸' : '·';
      rh.appendChild(arrow);
      var tagS = document.createElement('span'); tagS.className = 'tn-inode-tag';
      tagS.textContent = _tagLabel(node);
      rh.appendChild(tagS);
      var innerTxt = (node.textContent || '').replace(/\s+/g, ' ').trim();
      if (innerTxt.length > 0) {
        var its = document.createElement('span'); its.className = 'tn-inode-txt';
        its.textContent = innerTxt.length > 50 ? innerTxt.substring(0, 50) + '…' : innerTxt;
        rh.appendChild(its);
      }
      row.appendChild(rh);
      if (node.children.length && depth < TREE_DEPTH_MAX) {
        var cc = document.createElement('div'); cc.className = 'tn-children';
        _renderInnerChildren(node, cc, depth + 1);
        row.appendChild(cc);
      }
      container.appendChild(row);
    }
  });
}

/* Toggle inline HTML editor for a block node */
function _toggleTreeEdit(bid, wrap) {
  var wasOpen = !!wrap.querySelector('.tn-edit-wrap');
  // Close any open panels first
  document.querySelectorAll('.tn-edit-wrap, .tn-ins-wrap').forEach(function(el){ el.remove(); });
  if (wasOpen) return; // was already open → just closed it

  var b = _blocks.find(function(x){ return x.id === bid; });
  if (!b) return;

  var editWrap = document.createElement('div');
  editWrap.className = 'tn-edit-wrap';

  var ta = document.createElement('textarea');
  ta.value = b2html(b).trim();

  editWrap.appendChild(ta);

  btns.className = 'tn-edit-btns';

  var saveBtn = document.createElement('button');
  saveBtn.className = 'tn-edit-save';
  saveBtn.textContent = '✓ 应用';
  saveBtn.addEventListener('click', function() {
    _applyBlockHtml(bid, ta.value.trim());
    editWrap.remove();
  });

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'tn-edit-cancel';

/* Parse edited HTML and update the corresponding block */
function _applyBlockHtml(bid, newHtml) {
  var idx = _blocks.findIndex(function(b){ return b.id === bid; });
  if (idx < 0) return;

  var wrapped = '<div class="ar">' + newHtml + '</div>';
  var parsed = parseHtmlToBlocks(wrapped);

  var newBlock;
  // Use the first recognised block; if the HTML is unrecognised it becomes a raw block
  if (parsed && parsed.length > 0 && parsed[0].type !== 'raw') {
    newBlock = parsed[0];
    newBlock.id = bid;
  } else {
    // Store as a raw block so nothing is lost
    newBlock = mkBlock('raw', { html: newHtml });
    newBlock.id = bid;
  }

  _blocks[idx] = newBlock;
  var oldEl = $id(bid);
  if (oldEl) oldEl.parentNode.replaceChild(_buildBlockEl(newBlock), oldEl);
  syncCode();
  schedPv();
}

/* Insert a regular block after the given block id */
function _insertBlockAfter(afterBid, type) {
  var idx = _blocks.findIndex(function(b){ return b.id === afterBid; });
  if (idx < 0) { insertBlock(type); return; }
  var b = mkBlock(type, {});
  _blocks.splice(idx + 1, 0, b);
  var afterEl = $id(afterBid);
  var newEl = _buildBlockEl(b);
  if (afterEl) {
    if (afterEl.nextSibling) afterEl.parentNode.insertBefore(newEl, afterEl.nextSibling);
    else afterEl.parentNode.appendChild(newEl);
  } else {
    $id('blist').appendChild(newEl);
  }
  var hint = $id('ehint');
  if (hint && hint.parentNode) hint.parentNode.removeChild(hint);
  _updateCount();
  syncCode();
  schedPv();
  setTimeout(function(){ setSelected(b.id); }, 40);
}

/* Insert a raw (custom HTML) block after the given block and open its editor */
function _insertRawBlockAfter(afterBid) {
  var idx = _blocks.findIndex(function(b){ return b.id === afterBid; });
  if (idx < 0) return;
  var b = mkBlock('raw', { html: '<div>自定义 HTML</div>' });
  _blocks.splice(idx + 1, 0, b);
  var afterEl = $id(afterBid);
  var newEl = _buildBlockEl(b);
  if (afterEl) {
    if (afterEl.nextSibling) afterEl.parentNode.insertBefore(newEl, afterEl.nextSibling);
    else afterEl.parentNode.appendChild(newEl);
  } else {
    $id('blist').appendChild(newEl);
  }
  var hint = $id('ehint');
  if (hint && hint.parentNode) hint.parentNode.removeChild(hint);
  _updateCount();
  syncCode();
  schedPv();
  // Auto-open the HTML editor for the new raw block
  setTimeout(function() {
    setSelected(b.id);
    var tnEl = $id('tn-' + b.id);
    if (tnEl) _toggleTreeEdit(b.id, tnEl);
  }, 80);
}

/* =========================================================
   FORMAT BAR
   ========================================================= */
(function(){
  var bar = $id('fmt-bar');
  var _savedRange = null;
  var _hideFmtTimer = null;

  // Prevent focus loss when clicking format buttons (keep selection in rich-be)
  bar.addEventListener('mousedown', function(e) {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) _savedRange = sel.getRangeAt(0).cloneRange();
    e.preventDefault(); // don't move focus away from the contentEditable
  });

  function restoreSel() {
    if (_savedRange) {
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(_savedRange);
    }
  }

  // Trigger syncCode after execCommand (execCommand fires 'input' in most browsers,
  // but dispatch manually to be safe after we restore selection)
  function afterFormat() {
    var el = document.activeElement;
    while (el && el !== document.body) {
      if (el.classList && el.classList.contains('rich-be')) {
        el.dispatchEvent(new Event('input', { bubbles: true }));
        break;
      }
      el = el.parentNode;
    }
  }

  $id('fmt-b').addEventListener('click', function() { restoreSel(); document.execCommand('bold',         false, null); afterFormat(); });
  $id('fmt-i').addEventListener('click', function() { restoreSel(); document.execCommand('italic',       false, null); afterFormat(); });
  $id('fmt-s').addEventListener('click', function() { restoreSel(); document.execCommand('strikeThrough',false, null); afterFormat(); });
  $id('fmt-u').addEventListener('click', function() { restoreSel(); document.execCommand('underline',    false, null); afterFormat(); });

  document.querySelectorAll('.fmt-clr').forEach(function(sw) {
    sw.addEventListener('click', function() {
      restoreSel();
      var c = sw.dataset.c;
      if (c) {
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, c);
        document.execCommand('styleWithCSS', false, false);
      } else {
        // Empty data-c = clear color only (don't remove other formatting)
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, 'inherit');
        document.execCommand('styleWithCSS', false, false);
      }
      afterFormat();
    });
  });

  function nodeInRichBE(node) {
    while (node && node !== document.body) {
      if (node.classList && node.classList.contains('rich-be')) return node;
      node = node.parentNode;
    }
    return null;
  }

  document.addEventListener('selectionchange', function() {
    clearTimeout(_hideFmtTimer);
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) {
      _hideFmtTimer = setTimeout(function() { bar.classList.remove('vis'); }, 120);
      return;
    }
    var rb = nodeInRichBE(sel.anchorNode);
    if (!rb) { _hideFmtTimer = setTimeout(function() { bar.classList.remove('vis'); }, 120); return; }

    var range = sel.getRangeAt(0);
    var rect = range.getBoundingClientRect();
    if (!rect.width && !rect.height) { bar.classList.remove('vis'); return; }

    bar.classList.add('vis');
    var bw = bar.offsetWidth || 200;
    var bh = bar.offsetHeight || 34;
    var left = Math.max(4, Math.min(rect.left + rect.width / 2 - bw / 2, window.innerWidth - bw - 4));
    var top  = rect.top - bh - 8;
    if (top < 4) top = rect.bottom + 8;
    bar.style.left = left + 'px';
    bar.style.top  = top  + 'px';

    // Reflect active state of format commands
    try {
      $id('fmt-b').classList.toggle('on', document.queryCommandState('bold'));
      $id('fmt-i').classList.toggle('on', document.queryCommandState('italic'));
      $id('fmt-s').classList.toggle('on', document.queryCommandState('strikeThrough'));
      $id('fmt-u').classList.toggle('on', document.queryCommandState('underline'));
    } catch(e) { /* queryCommandState may throw in sandboxed contexts; safe to ignore */ }
  });
})();

var _scKey = 'htmleditor_sc_v1'; // localStorage key
var _scMap = {};                  // id → current key ('' = unbound)

(function() {
  SC_DEFS.forEach(function(d) { if (!d.fixed) _scMap[d.id] = d.def; });
  try {
    var s = localStorage.getItem(_scKey);
    if (s) {
      var o = JSON.parse(s);
      SC_DEFS.forEach(function(d) {
        if (!d.fixed && o.hasOwnProperty(d.id) && typeof o[d.id] === 'string') {
          _scMap[d.id] = o[d.id];
        }
      });
    }
  } catch(ex) {}
})();

function _scSave() {
  try { localStorage.setItem(_scKey, JSON.stringify(_scMap)); } catch(ex) {}
}

/* Returns true if the configurable shortcut `id` is bound to `keyNorm` (lowercase) */
function _scMatchesKey(id, keyNorm) {
  var k = _scMap[id];
  return k !== '' && k !== undefined && k.toLowerCase() === keyNorm;
}

function _scReset() {
  SC_DEFS.forEach(function(d) { if (!d.fixed) _scMap[d.id] = d.def; });
  _scSave();
  _scCapturing = null;
  _renderScModal();
}
